<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>lyc书库 · 小说社区</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f2eb; color:#3b3226; padding-bottom:70px; }
    .container { max-width:800px; margin:0 auto; padding:15px; }
    .navbar { display:flex; justify-content:space-between; align-items:center; background:#fff; padding:10px 15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    .logo { font-size:1.3rem; font-weight:bold; color:#6b5b4a; cursor:pointer; }
    .user-badge { display:flex; align-items:center; gap:6px; }
    .avatar-circle { width:30px; height:30px; border-radius:50%; background:#8b7355; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; overflow:hidden; }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; }
    .card { background:#fff; border-radius:10px; padding:15px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    .novel-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
    .novel-card { background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.05); cursor:pointer; transition:transform 0.2s; }
    .novel-card:hover { transform:translateY(-2px); }
    .novel-cover { width:100%; height:180px; object-fit:cover; background:#f0ece4; }
    .novel-info { padding:8px; }
    .novel-title { font-weight:bold; font-size:13px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .novel-desc { font-size:11px; color:#888; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .novel-author { font-size:11px; color:#aaa; margin-top:2px; }
    .flex-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0ece4; }
    .flex-row:last-child { border-bottom:none; }
    button { background:#8b7355; color:#fff; border:none; padding:6px 14px; border-radius:5px; cursor:pointer; font-size:13px; }
    button.outline { background:transparent; border:1px solid #8b7355; color:#8b7355; }
    button.danger { background:#b55; }
    input,textarea,select { width:100%; padding:8px; border:1px solid #ddd6c8; border-radius:5px; font-size:14px; margin-top:6px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-content { background:#fff; border-radius:12px; padding:25px; min-width:300px; max-width:90%; position:relative; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .close { position:absolute; top:10px; right:15px; font-size:18px; cursor:pointer; color:#8b7355; }
    .hidden { display:none !important; }
    a { color:#8b7355; cursor:pointer; text-decoration:none; }
    .meta { font-size:12px; color:#888; }
    .btn-group { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
    .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:#fff; border-top:1px solid #e0d7c6; display:flex; justify-content:space-around; padding:8px 0; z-index:99; }
    .bottom-nav button { background:none; border:none; color:#8b7355; font-size:12px; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .bottom-nav button.active { color:#3b3226; font-weight:bold; }
    pre { white-space:pre-wrap; font-family:inherit; }
    .rank-list { list-style:none; }
    .rank-list li { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #f0ece4; }
    .rank-list li:last-child { border-bottom:none; }
    .rank-num { font-size:18px; font-weight:bold; color:#8b7355; width:24px; text-align:center; }
    .chapter-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0ece4; }
    .chapter-item:last-child { border-bottom:none; }
    .nav-chapter { display:flex; justify-content:space-between; margin-top:15px; }
    .follow-btn { background:#4a6fa5; font-size:12px; padding:4px 12px; }
    .follow-btn.following { background:#aaa; }
    /* 帖子样式 */
    .post-item { border-bottom:1px solid #f0ece4; padding:12px 0; }
    .post-item:last-child { border-bottom:none; }
    .post-title { font-weight:bold; }
    .post-meta { font-size:12px; color:#888; }
    .vote-btns { display:flex; gap:8px; align-items:center; }
    .vote-btns button { background:transparent; border:1px solid #ddd; color:#555; padding:2px 8px; font-size:12px; }
    .vote-btns button.active { background:#8b7355; color:#fff; border-color:#8b7355; }
    .reply-item { margin-left:20px; margin-top:10px; padding:8px 0; border-bottom:1px solid #f0ece4; }
    .reply-item:last-child { border-bottom:none; }
    @media (max-width:400px) { .novel-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app"></div>
<nav class="bottom-nav" id="bottom-nav">
  <button onclick="navigate('#home')" class="active"><span>🏠</span>首页</button>
  <button onclick="navigate('#community')"><span>💬</span>社区</button>
  <button onclick="navigate('#new-novel')"><span>✏️</span>发布</button>
  <button onclick="navigate('#profile')"><span>👤</span>我的</button>
  <button id="admin-nav" class="hidden" onclick="navigate('#admin')"><span>⚙️</span>后台</button>
</nav>
<div id="modal-container"></div>

<script>
  const SUPABASE_URL = 'https://srbibtnvtpygegmtehzb.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8ET2ng5O0n6phqCtoz3bxA_xTn2cTsi';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let user = null, profile = null;
  let rendering = false;

  function navigate(hash) { window.location.hash = hash; }
  window.onhashchange = () => render();

  async function render() {
    if (rendering) return;
    rendering = true;
    const app = document.getElementById('app'); app.innerHTML = '';
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { user = session.user; await loadProfile(); }
    else { user = null; profile = null; }

    const nav = document.createElement('div'); nav.className = 'navbar';
    nav.innerHTML = `<span class="logo" onclick="navigate('#home')">📖 lyc书库</span>`;
    if (user && profile) {
      const avatarHtml = profile.avatar_url ? `<img src="${profile.avatar_url}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">` : profile.username[0];
      nav.innerHTML += `<div class="user-badge">
        <a onclick="navigate('#user/${esc(profile.username)}')" style="display:flex;align-items:center;gap:4px;">
          <div class="avatar-circle">${avatarHtml}</div> ${esc(profile.username)}
        </a>
        <button onclick="signOut()" style="font-size:11px;padding:3px 8px;">退出</button>
      </div>`;
    } else {
      nav.innerHTML += `<div><button onclick="openModal('login')">登录</button><button onclick="openModal('register')" style="margin-left:4px;">注册</button></div>`;
    }
    app.appendChild(nav);
    document.getElementById('admin-nav').classList.toggle('hidden', profile?.role !== 'admin');

    const hash = location.hash || '#home';
    if (hash === '#home') await home(app);
    else if (hash.startsWith('#novel/')) {
      const parts = hash.split('/');
      if (parts.length === 3 && parts[2] === 'chapters') await chapterList(app, parts[1]);
      else await novelDetail(app, parts[1]);
    }
    else if (hash.startsWith('#chapter/')) await chapterContent(app, hash.split('/')[1]);
    else if (hash.startsWith('#user/')) await userPage(app, hash.split('/')[1]);
    else if (hash === '#community') await communityList(app);
    else if (hash.startsWith('#post/')) await postDetail(app, hash.split('/')[1]);
    else if (hash === '#new-novel') await newNovel(app);
    else if (hash === '#profile') await myProfile(app);
    else if (hash === '#admin' && profile?.role === 'admin') await adminPanel(app);
    else home(app);

    rendering = false;
  }

  async function loadProfile() {
    if (!user) return;
    const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    profile = data || null;
  }

  // ========== 通用模态框 ==========
  function openModal(type, data) {
    const container = document.getElementById('modal-container');
    if (type === 'login') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>登录</h3>
        <input id="luser" placeholder="用户名"><input id="lpass" type="password" placeholder="密码" style="margin-top:8px;">
        <button onclick="doLogin()" style="width:100%;margin-top:12px;">登录</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'register') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>注册</h3>
        <input id="ruser" placeholder="用户名"><input id="remail" placeholder="邮箱" style="margin-top:8px;"><input id="rpass" type="password" placeholder="密码(6位+)" style="margin-top:8px;">
        <button onclick="doRegister()" style="width:100%;margin-top:12px;">注册</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'change-password') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>修改密码</h3>
        <input id="newpw" type="password" placeholder="新密码(至少6位)"><button onclick="changePassword()" style="width:100%;margin-top:12px;">确认修改</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'upload-avatar') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>上传头像</h3>
        <input type="file" id="avatar-file" accept="image/*"><button onclick="uploadAvatar()" style="width:100%;margin-top:12px;">上传</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'upload-cover') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>上传封面</h3>
        <input type="file" id="cover-file" accept="image/*"><button onclick="uploadCover('${data}')" style="width:100%;margin-top:12px;">上传</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'edit-bio') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>编辑个人简介</h3>
        <textarea id="bio-text" rows="4" placeholder="介绍一下自己...">${esc(profile?.bio || '')}</textarea>
        <button onclick="saveBio()" style="width:100%;margin-top:12px;">保存</button><div id="err" style="color:red;"></div>
      </div></div>`;
    }
  }
  function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

  async function doLogin() {
    const u = document.getElementById('luser').value.trim(), p = document.getElementById('lpass').value;
    const e = document.getElementById('err');
    if (!u || !p) return e.textContent = '请输入用户名和密码';
    const { data: pf } = await supabaseClient.from('profiles').select('email').eq('username', u).single();
    if (!pf) return e.textContent = '用户名不存在';
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: pf.email, password: p });
    if (error) return e.textContent = '密码错误';
    closeModal(); user = data.user; await loadProfile(); render();
  }

  async function doRegister() {
    const u = document.getElementById('ruser').value.trim();
    const em = document.getElementById('remail').value.trim();
    const pw = document.getElementById('rpass').value;
    const e = document.getElementById('err'); e.textContent = '';
    if (!u || !em || !pw) return e.textContent = '请填写完整';
    if (pw.length < 6) return e.textContent = '密码至少6位';
    const { data: exist } = await supabaseClient.from('profiles').select('id').or(`username.eq."${u}",email.eq."${em}"`).maybeSingle();
    if (exist) return e.textContent = '用户名或邮箱已被注册';
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email: em, password: pw });
    if (signUpError) return e.textContent = signUpError.message;
    if (!signUpData?.user) return e.textContent = '注册失败';
    if (!signUpData.session) {
      const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({ email: em, password: pw });
      if (loginError) { closeModal(); alert('注册成功！请手动登录'); return render(); }
      user = loginData.user;
    } else { await supabaseClient.auth.setSession(signUpData.session); user = signUpData.user; }
    const role = em === '18631167199@163.com' ? 'admin' : 'user';
    await supabaseClient.from('profiles').upsert({ id: user.id, username: u, email: em, role });
    closeModal(); await loadProfile(); render();
  }

  async function changePassword() {
    const pw = document.getElementById('newpw').value;
    const e = document.getElementById('err');
    if (!pw || pw.length < 6) return e.textContent = '密码至少6位';
    const { error } = await supabaseClient.auth.updateUser({ password: pw });
    if (error) return e.textContent = error.message;
    alert('密码修改成功'); closeModal();
  }

  async function uploadAvatar() {
    const file = document.getElementById('avatar-file').files[0];
    const e = document.getElementById('err');
    if (!file) return e.textContent = '请选择文件';
    const path = `${user.id}.${file.name.split('.').pop()}`;
    const { error } = await supabaseClient.storage.from('avatars').upload(path, file, { upsert: true });
    if (error) return e.textContent = error.message;
    const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(path);
    await supabaseClient.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
    await loadProfile(); closeModal(); render();
  }

  async function uploadCover(novelId) {
    const file = document.getElementById('cover-file').files[0];
    const e = document.getElementById('err');
    if (!file) return e.textContent = '请选择文件';
    const path = `${novelId}_cover.${file.name.split('.').pop()}`;
    const { error } = await supabaseClient.storage.from('covers').upload(path, file, { upsert: true });
    if (error) return e.textContent = error.message;
    const { data: { publicUrl } } = supabaseClient.storage.from('covers').getPublicUrl(path);
    await supabaseClient.from('novels').update({ cover_url: publicUrl }).eq('id', novelId);
    closeModal(); navigate(`#novel/${novelId}`);
  }

  async function saveBio() {
    const bio = document.getElementById('bio-text').value.trim();
    const { error } = await supabaseClient.from('profiles').update({ bio }).eq('id', user.id);
    if (error) return document.getElementById('err').textContent = error.message;
    closeModal(); await loadProfile(); render();
  }

  async function signOut() { await supabaseClient.auth.signOut(); user = null; profile = null; render(); }

  // ========== 首页（原样） ==========
  async function home(container) {
    const { data: ann } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
    if (ann?.length) {
      const div = document.createElement('div'); div.className = 'card';
      div.innerHTML = `<strong>📢 公告</strong><br>${marked.parse(ann[0].content)}`;
      container.appendChild(div);
    }
    const searchDiv = document.createElement('div'); searchDiv.className = 'card';
    searchDiv.innerHTML = `<input id="search" placeholder="搜索小说、作者、用户..."><button onclick="search()" style="margin-top:6px;">搜索</button><div id="results" style="margin-top:10px;"></div>`;
    container.appendChild(searchDiv);
    const { data: allNovels } = await supabaseClient.from('novels').select('*, profiles(username), ratings(score)').order('updated_at', { ascending: false }).limit(50);
    const ranked = allNovels?.map(n => {
      const scores = n.ratings?.map(r=>r.score) || [];
      const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
      return { ...n, avg };
    }).filter(n => n.avg > 0).sort((a,b) => b.avg - a.avg).slice(0,10);
    if (ranked?.length) {
      const rankCard = document.createElement('div'); rankCard.className = 'card';
      rankCard.innerHTML = '<h3>🏆 巅峰榜</h3><ul class="rank-list"></ul>';
      const list = rankCard.querySelector('.rank-list');
      ranked.forEach((n, i) => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="rank-num">${i+1}</span><div style="flex:1;"><a onclick="navigate('#novel/${n.id}')">${esc(n.title)}</a> <span style="font-size:12px;">⭐${n.avg.toFixed(1)}</span></div>`;
        list.appendChild(li);
      });
      container.appendChild(rankCard);
    }
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false }).limit(30);
    const grid = document.createElement('div'); grid.className = 'novel-grid';
    const placeholder = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22180%22%3E%3Crect fill=%22%23f0ece4%22 width=%22150%22 height=%22180%22/%3E%3C/svg%3E';
    if (novels?.length) {
      novels.forEach(n => {
        const card = document.createElement('div'); card.className = 'novel-card';
        card.onclick = () => navigate(`#novel/${n.id}`);
        const coverUrl = n.cover_url || placeholder;
        card.innerHTML = `<img class="novel-cover" src="${coverUrl}" loading="lazy" onerror="this.onerror=null;this.src='${placeholder}'" alt="封面">
          <div class="novel-info"><div class="novel-title">${esc(n.title)}</div><div class="novel-desc">${esc(n.description || '暂无简介')}</div><div class="novel-author">${esc(n.profiles?.username)}</div></div>`;
        grid.appendChild(card);
      });
    } else grid.innerHTML = '<p style="color:#888;">还没有小说，快来发布吧！</p>';
    container.appendChild(grid);
  }

  async function search() {
    const kw = document.getElementById('search').value.trim();
    const resultsDiv = document.getElementById('results'); resultsDiv.innerHTML = '';
    if (!kw) return;
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').ilike('title', `%${kw}%`).limit(10);
    const { data: users } = await supabaseClient.from('profiles').select('*').ilike('username', `%${kw}%`).limit(10);
    if (users?.length) {
      resultsDiv.innerHTML += '<b>👥 用户</b>';
      users.forEach(u => resultsDiv.innerHTML += `<div><a onclick="navigate('#user/${esc(u.username)}')">${esc(u.username)}</a></div>`);
    }
    if (novels?.length) {
      resultsDiv.innerHTML += '<b>📚 小说</b>';
      novels.forEach(n => resultsDiv.innerHTML += `<div class="flex-row"><div><a onclick="navigate('#novel/${n.id}')">${esc(n.title)}</a></div><span>${esc(n.profiles?.username)}</span></div>`);
    }
    if (!users?.length && !novels?.length) resultsDiv.innerHTML = '<p>无结果</p>';
  }

  // ========== 小说详情（保留） ==========
  async function novelDetail(container, novelId) {
    const { data: novel } = await supabaseClient.from('novels').select('*, profiles(username)').eq('id', novelId).single();
    if (!novel) return container.innerHTML += '<p>不存在</p>';
    const { data: ratings } = await supabaseClient.from('ratings').select('score').eq('novel_id', novelId);
    const avg = ratings?.length ? (ratings.reduce((a,b)=>a+b.score,0)/ratings.length).toFixed(1) : '-';
    const userRating = user ? ratings?.find(r=>r.user_id === user.id) : null;
    let isFollowing = false;
    if (user && user.id !== novel.author_id) {
      const { data: f } = await supabaseClient.from('follows').select('*').eq('follower_id', user.id).eq('following_id', novel.author_id).maybeSingle();
      isFollowing = !!f;
    }
    const infoCard = document.createElement('div'); infoCard.className = 'card';
    infoCard.innerHTML = `
      <a onclick="navigate('#home')" style="font-size:12px;">← 首页</a>
      <div style="display:flex; gap:15px; margin-top:10px; flex-wrap:wrap;">
        <img src="${novel.cover_url || 'data:image/svg+xml,...'}" style="width:100px;height:140px;object-fit:cover;border-radius:8px; background:#f0ece4;">
        <div style="flex:1; min-width:200px;">
          <h2>${esc(novel.title)}</h2>
          <p>作者：<a onclick="navigate('#user/${esc(novel.profiles.username)}')">${esc(novel.profiles.username)}</a>
          ${user && user.id !== novel.author_id ? `<button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow('${novel.author_id}')" style="margin-left:6px;">${isFollowing?'已关注':'+ 关注'}</button>` : ''}</p>
          <p>⭐ ${avg} (${ratings?.length||0}人) | 状态：${novel.status} | 分类：${novel.genre||''}</p>
          <p>${esc(novel.description||'')}</p>
          <div class="btn-group">
            <button onclick="navigate('#novel/${novelId}/chapters')">📖 章节列表</button>
            ${user?.id === novel.author_id ? `<button class="outline" onclick="openModal('upload-cover','${novelId}')">🖼️ 上传封面</button><button class="outline" onclick="editNovel(${novel.id})">✏️ 编辑</button><button class="danger" onclick="deleteNovel(${novel.id})">🗑️ 删除</button>` : ''}
            ${profile?.role === 'admin' && user?.id !== novel.author_id ? `<button class="danger" onclick="deleteNovel(${novel.id})">管理员删除</button>` : ''}
          </div>
          ${user ? `
            <div style="margin-top:10px;">
              <label>我的评分：</label>
              <select id="my-rating" style="width:auto;">
                <option value="0">未评分</option>
                <option value="1" ${userRating?.score===1?'selected':''}>1星</option>
                <option value="2" ${userRating?.score===2?'selected':''}>2星</option>
                <option value="3" ${userRating?.score===3?'selected':''}>3星</option>
                <option value="4" ${userRating?.score===4?'selected':''}>4星</option>
                <option value="5" ${userRating?.score===5?'selected':''}>5星</option>
              </select>
              <button onclick="rateNovel(${novel.id})">提交评分</button>
            </div>

  // ========== 章节内容（修复空指针） ==========
  async function chapterContent(container, chapterId) {
    const { data: chapter, error: chapterError } = await supabaseClient.from('chapters').select('*').eq('id', chapterId).maybeSingle();
    if (chapterError || !chapter) { container.innerHTML += '<p>章节不存在</p>'; return; }
    if (!chapter.novel_id) { container.innerHTML += '<p>章节数据异常</p>'; return; }

    const { data: novel } = await supabaseClient.from('novels').select('id, title, author_id').eq('id', chapter.novel_id).maybeSingle();
    if (!novel) { container.innerHTML += '<p>所属小说不存在</p>'; return; }

    const { data: allChapters } = await supabaseClient.from('chapters').select('id, chapter_number').eq('novel_id', novel.id).order('chapter_number');
    const list = allChapters || [];
    const idx = list.findIndex(ch => ch.id === chapterId);
    const prev = idx > 0 ? list[idx - 1] : null;
    const next = idx < list.length - 1 ? list[idx + 1] : null;

    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username)').eq('novel_id', novel.id).eq('chapter_id', chapterId).order('created_at', { ascending: true });

    const contentCard = document.createElement('div'); contentCard.className = 'card';
    contentCard.innerHTML = `
      <a onclick="navigate('#novel/${novel.id}/chapters')" style="font-size:12px;">← 返回章节列表</a>
      <h2>${esc(chapter.title)}</h2>
      <pre>${esc(chapter.content)}</pre>
      <div class="nav-chapter">
        <button onclick="navigate('#chapter/${prev?.id || ''}')" ${prev ? '' : 'disabled'}>← 上一章</button>
        <button onclick="navigate('#chapter/${next?.id || ''}')" ${next ? '' : 'disabled'}>下一章 →</button>
      </div>
      ${user?.id === novel.author_id ? `<div class="btn-group" style="margin-top:10px;"><button class="outline" onclick="editChapter(${chapter.id},${novel.id})">编辑</button><button class="danger" onclick="deleteChapter(${chapter.id},${novel.id})">删除</button></div>` : ''}
    `;
    container.appendChild(contentCard);

    const commCard = document.createElement('div'); commCard.className = 'card';
    commCard.innerHTML = '<h3>💬 本章评论区</h3>';
    if (comments?.length) {
      comments.forEach(c => commCard.innerHTML += `<div style="margin-bottom:8px;"><strong>${esc(c.profiles?.username)}</strong>：${esc(c.content)} <small>${new Date(c.created_at).toLocaleString()}</small></div>`);

    if (user) {
      commCard.innerHTML += `<textarea id="chapter-comment" placeholder="写下你的评论..." rows="3" style="margin-top:8px;"></textarea><button onclick="addChapterComment('${novel.id}','${chapterId}')" style="margin-top:6px;">发表评论</button>`;
    } else commCard.innerHTML += '<p>登录后可评论</p>';
    container.appendChild(commCard);
  }

    // 回复列表（含嵌套）
    const { data: replies } = await supabaseClient.from('post_replies').select('*, profiles(username)').eq('post_id', postId).order('created_at', { ascending: true });
    const replyCard = document.createElement('div'); replyCard.className = 'card';
    replyCard.innerHTML = '<h3>回复</h3>';
    if (replies?.length) {
      const rootReplies = replies.filter(r => !r.parent_id);
      rootReplies.forEach(r => {
        replyCard.appendChild(renderReply(r, replies));
      });
    } else replyCard.innerHTML += '<p>暂无回复</p>';
    if (user) {
      replyCard.innerHTML += `<textarea id="reply-content" placeholder="写下你的回复..." rows="3" style="margin-top:10px;"></textarea><button onclick="addReply(${post.id}, null)" style="margin-top:6px;">回复</button>`;
    }
    container.appendChild(replyCard);

  function renderReply(reply, allReplies, depth = 0) {
    const div = document.createElement('div');
    div.className = 'reply-item';
    div.style.marginLeft = depth > 0 ? '20px' : '0';
    div.innerHTML = `
      <strong>${esc(reply.profiles?.username)}</strong> <small>${new Date(reply.created_at).toLocaleString()}</small>
      <div>${esc(reply.content)}</div>
      ${user ? `<a onclick="openReplyForm(${reply.id})" style="font-size:12px;">回复</a>` : ''}
      ${(profile?.role === 'admin') ? `<a onclick="deleteReply(${reply.id})" class="danger" style="font-size:12px; margin-left:8px;">删除</a>` : ''}
      <div id="reply-form-${reply.id}" style="display:none; margin-top:6px;"></div>
    `;
    const children = allReplies.filter(r => r.parent_id === reply.id);
    if (children.length) {
      children.forEach(ch => div.appendChild(renderReply(ch, allReplies, depth + 1)));
    }
    return div;
  }

  window.openReplyForm = function(replyId) {
    const formDiv = document.getElementById(`reply-form-${replyId}`);
    formDiv.style.display = 'block';
    formDiv.innerHTML = `<textarea id="child-reply-${replyId}" rows="2" placeholder="回复..."></textarea><button onclick="addReplyChild(${replyId})" style="margin-top:4px;">提交</button>`;
  };

  async function votePost(postId, type) {
    if (!user) return alert('请先登录');
    // 检查是否已投票
    const { data: existing } = await supabaseClient.from('post_votes').select('*').eq('post_id', postId).eq('user_id', user.id).maybeSingle();
    if (existing) {
      if (existing.vote_type === type) {
        // 取消投票
        await supabaseClient.from('post_votes').delete().eq('id', existing.id);
        await supabaseClient.rpc('update_post_count', { postid: postId, type: existing.vote_type, change: -1 });
      } else {
        // 切换投票类型
        await supabaseClient.from('post_votes').update({ vote_type: type }).eq('id', existing.id);
        await supabaseClient.rpc('update_post_count', { postid: postId, type: existing.vote_type, change: -1 });
        await supabaseClient.rpc('update_post_count', { postid: postId, type: type, change: 1 });
      }
    } else {
      await supabaseClient.from('post_votes').insert({ post_id: postId, user_id: user.id, vote_type: type });
      await supabaseClient.rpc('update_post_count', { postid: postId, type: type, change: 1 });
    }
    navigate(`#post/${postId}`);
  }

  // 需要在Supabase中创建RPC函数（见下）
  // 如果不想用RPC，可以在应用层更新like_count/dislike_count，但更简单的是直接查询投票数，此处改为应用层更新：
  async function updateVoteCounts(postId) {
    const { data: likes } = await supabaseClient.from('post_votes').select('*').eq('post_id', postId).eq('vote_type', 'like');
    const { data: dislikes } = await supabaseClient.from('post_votes').select('*').eq('post_id', postId).eq('vote_type', 'dislike');
    await supabaseClient.from('posts').update({ like_count: likes.length, dislike_count: dislikes.length }).eq('id', postId);
  }
  // 修改votePost为应用层更新：
  async function votePost(postId, type) {
    if (!user) return alert('请先登录');
    const { data: existing } = await supabaseClient.from('post_votes').select('*').eq('post_id', postId).eq('user_id', user.id).maybeSingle();
    if (existing) {
      if (existing.vote_type === type) {
        await supabaseClient.from('post_votes').delete().eq('id', existing.id);
      } else {
        await supabaseClient.from('post_votes').update({ vote_type: type }).eq('id', existing.id);
      }
    } else {
      await supabaseClient.from('post_votes').insert({ post_id: postId, user_id: user.id, vote_type: type });
    }
    await updateVoteCounts(postId);
    navigate(`#post/${postId}`);
  }

  async function togglePin(postId) {
    const { data: post } = await supabaseClient.from('posts').select('is_pinned').eq('id', postId).single();
    await supabaseClient.from('posts').update({ is_pinned: !post.is_pinned }).eq('id', postId);
    navigate(`#post/${postId}`);
  }

  async function deletePost(postId) {
    if (!confirm('删除帖子？')) return;
    await supabaseClient.from('posts').delete().eq('id', postId);
    alert('已删除'); navigate('#community');
  }

  async function deleteReply(replyId) {
    if (!confirm('删除回复？')) return;
    const { data: reply } = await supabaseClient.from('post_replies').select('post_id').eq('id', replyId).single();
    await supabaseClient.from('post_replies').delete().eq('id', replyId);
    navigate(`#post/${reply.post_id}`);
  }

  // ========== 管理员后台 ==========
  async function adminPanel(container) {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<button onclick="adminComments()">管理评论</button><button onclick="adminNovels()" style="margin-left:6px;">管理小说</button><button onclick="adminPosts()" style="margin-left:6px;">管理帖子</button><button onclick="adminAdmins()" style="margin-left:6px;">管理管理员</button><button onclick="editAnnouncement()" style="margin-left:6px;">编辑公告</button>`;
    container.appendChild(card);
    const content = document.createElement('div'); content.id = 'admin-content'; container.appendChild(content);
    adminComments();
  }

  async function adminPosts() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data: posts } = await supabaseClient.from('posts').select('*, profiles(username)').order('created_at', { ascending: false });
    if (posts?.length) posts.forEach(p => c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;"><b>${esc(p.title)}</b> 作者：${esc(p.profiles?.username)} <button class="danger" onclick="deletePost(${p.id})">删除</button></div>`);
    else c.innerHTML = '<p>暂无帖子</p>';
  }
  // adminComments, adminNovels, adminAdmins 保持原样但略加调整
  async function adminComments() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data } = await supabaseClient.from('comments').select('*, profiles(username), novels(title)').order('created_at', { ascending: false });
    if (data?.length) data.forEach(d => c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;">${esc(d.profiles?.username)} 评《${esc(d.novels.title)}》：${esc(d.content)} <button class="danger" onclick="deleteComment(${d.id})">删除</button></div>`);
    else c.innerHTML = '<p>暂无评论</p>';
  }
  async function deleteComment(id) { if (confirm('删除？')) { await supabaseClient.from('comments').delete().eq('id', id); adminComments(); } }
  async function adminNovels() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    if (data?.length) data.forEach(d => c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;"><b>${esc(d.title)}</b> 作者：${esc(d.profiles?.username)} <button class="danger" style="float:right;" onclick="deleteNovelAdmin('${d.id}')">删除</button></div>`);
    else c.innerHTML = '<p>暂无小说</p>';
  }
  async function deleteNovelAdmin(id) { if (confirm('强制删除？')) { await supabaseClient.from('novels').delete().eq('id', id); adminNovels(); } }
  async function adminAdmins() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data: profiles } = await supabaseClient.from('profiles').select('*');
    if (profiles) profiles.forEach(p => {
      c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;">${esc(p.username)} (${p.role}) ${p.email !== '18631167199@163.com' && p.id !== user.id ? `<button onclick="toggleAdmin('${p.id}')">${p.role==='admin'?'撤销':'设为'}管理员</button>` : '<small>（超级管理员）</small>'}</div>`;
    });
  }
  async function toggleAdmin(userId) {
    const { data: p } = await supabaseClient.from('profiles').select('role,email').eq('id', userId).single();
    if (p.email === '18631167199@163.com') return alert('超级管理员不可更改');
    await supabaseClient.from('profiles').update({ role: p.role === 'admin' ? 'user' : 'admin' }).eq('id', userId);
    adminAdmins();
  }
  function editAnnouncement() {
    openGenericForm('编辑公告（支持 Markdown）', `<textarea id="ann" rows="6" placeholder="公告内容..."></textarea><small>支持 Markdown 语法</small>`, async () => {
      const content = document.getElementById('ann').value.trim();
      if (!content) throw new Error('公告不能为空');
      await supabaseClient.from('announcements').insert({ content });
      alert('公告已更新');
    });
  }

  // ========== 通用工具 ==========
  function openGenericForm(title, html, cb) {
    const container = document.getElementById('modal-container');
    container.innerHTML = `<div class="modal"><div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span><h3>${title}</h3>
      <div id="generic-form-body">${html}</div>
      <button id="generic-submit" onclick="submitGenericForm()" style="width:100%;margin-top:12px;">提交</button>
      <div id="generic-err" style="color:red;"></div>
    </div></div>`;
    window.__genericCallback = cb;
  }
  function submitGenericForm() {
    const cb = window.__genericCallback;
    if (!cb) return;
    const err = document.getElementById('generic-err'); err.textContent = '';
    cb().then(() => closeModal()).catch(e => err.textContent = e.message);
  }
  function showConfirm(msg, onConfirm) {
    const container = document.getElementById('modal-container');
    container.innerHTML = `<div class="modal"><div class="modal-content" style="text-align:center;">
      <p>${msg}</p>
      <div class="btn-group" style="justify-content:center;margin-top:15px;">
        <button class="outline" onclick="closeModal()">取消</button>
        <button class="danger" id="confirm-ok">确认</button>
      </div>
    </div></div>`;
    document.getElementById('confirm-ok').onclick = () => { closeModal(); onConfirm(); };
  }
  function esc(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true });

  render();
</script>
</body>
</html>
