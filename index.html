<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>lyc书库 · 小说社区</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f2eb; color:#3b3226; }
    .container { max-width:900px; margin:0 auto; padding:20px; }
    .navbar { display:flex; justify-content:space-between; align-items:center; background:#fff; padding:12px 20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .logo { font-size:1.5rem; font-weight:bold; color:#6b5b4a; cursor:pointer; }
    .nav-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .avatar-circle { width:34px; height:34px; border-radius:50%; background:#8b7355; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; }
    .card { background:#fff; border-radius:12px; padding:20px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .flex-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:space-between; border-bottom:1px solid #f0ece4; padding:12px 0; }
    .flex-row:last-child { border-bottom:none; }
    button { background:#8b7355; color:#fff; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:14px; }
    button.outline { background:transparent; border:1px solid #8b7355; color:#8b7355; }
    button.danger { background:#b55; }
    input,textarea,select { width:100%; padding:10px; border:1px solid #ddd6c8; border-radius:6px; font-size:14px; margin-top:8px; }
    .stars { color:#e6b422; font-size:18px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-content { background:#fff; border-radius:12px; padding:30px; min-width:340px; max-width:90%; position:relative; }
    .close { position:absolute; top:10px; right:20px; font-size:20px; cursor:pointer; }
    .hidden { display:none !important; }
    hr { margin:15px 0; border:0.5px solid #eee; }
    .back-link { display:inline-block; margin-bottom:15px; color:#8b7355; cursor:pointer; font-size:14px; }
    a { color:#8b7355; cursor:pointer; text-decoration:none; }
    a:hover { text-decoration:underline; }
    pre { white-space:pre-wrap; font-family:inherit; }
    .section-title { font-size:1.2rem; font-weight:bold; margin-bottom:10px; color:#5b4b3a; }
    .edit-btn { background:#b5a07e; font-size:12px; padding:4px 10px; margin-left:10px; }
    .delete-btn { background:#d9534f; color:#fff; font-size:12px; padding:4px 10px; margin-left:6px; }
    .search-box { display:flex; gap:8px; margin-bottom:15px; }
    .search-box input { flex:1; }
    .search-box button { width:auto; padding:8px 20px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app"></div>

<!-- 登录模态框 -->
<div id="login-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeLoginModal()">&times;</span>
    <h3>登录</h3>
    <input type="text" id="login-username" placeholder="用户名">
    <input type="password" id="login-password" placeholder="密码">
    <button onclick="login()" style="width:100%; margin-top:12px;">登录</button>
    <div id="login-error" style="color:red;"></div>
  </div>
</div>

<!-- 注册模态框 -->
<div id="register-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeRegisterModal()">&times;</span>
    <h3>注册</h3>
    <input type="text" id="reg-username" placeholder="用户名">
    <input type="email" id="reg-email" placeholder="邮箱">
    <input type="password" id="reg-password" placeholder="密码(至少6位)">
    <button onclick="register()" style="width:100%; margin-top:12px;">注册</button>
    <div id="reg-error" style="color:red;"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://srbibtnvtpygegmtehzb.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8ET2ng5O0n6phqCtoz3bxA_xTn2cTsi';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentProfile = null;
  let isRendering = false;

  // ===================== 路由 =====================
  function navigate(hash) { window.location.hash = hash; render(); }
  window.onhashchange = () => render();

  async function render() {
    if (isRendering) return;
    isRendering = true;
    const app = document.getElementById('app');
    app.innerHTML = '';

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { currentUser = session.user; await fetchProfile(); }
    else { currentUser = null; currentProfile = null; }

    const nav = document.createElement('div'); nav.className = 'navbar';
    nav.innerHTML = `<div class="logo" onclick="navigate('#home')">📖 lyc书库</div><div class="nav-actions" id="nav-actions"></div>`;
    const actions = nav.querySelector('#nav-actions');
    if (currentUser && currentProfile) {
      actions.innerHTML = `
        ${currentProfile.role === 'admin' ? '<button class="outline" onclick="navigate(\'#admin\')">后台</button>' : ''}
        <button class="outline" onclick="navigate('#new-novel')">发布小说</button>
        <button class="outline" onclick="navigate('#profile')">个人中心</button>
        <div class="avatar-circle" title="${escapeHtml(currentProfile.username)}">${escapeHtml(currentProfile.username[0])}</div>
        <button onclick="signOut()">退出</button>`;
    } else {
      actions.innerHTML = `<button onclick="openLoginModal()">登录</button><button onclick="openRegisterModal()">注册</button>`;
    }
    app.appendChild(nav);

    const hash = window.location.hash || '#home';
    if (hash === '#home') await renderHome(app);
    else if (hash.startsWith('#novel/')) {
      const novelId = hash.split('/')[1];
      await renderNovelDetail(app, novelId);
    }
    else if (hash === '#new-novel') await renderNewNovel(app);
    else if (hash === '#profile') await renderProfile(app);
    else if (hash === '#admin' && currentProfile?.role === 'admin') await renderAdmin(app);
    else renderHome(app);

    isRendering = false;
  }

  async function fetchProfile() {
    if (!currentUser) return;
    const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = data || null;
  }

  // 登录/注册
  function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
  function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
  function openRegisterModal() { document.getElementById('register-modal').classList.remove('hidden'); }
  function closeRegisterModal() { document.getElementById('register-modal').classList.add('hidden'); }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error'); err.textContent = '';
    if (!username || !password) return err.textContent = '请输入用户名和密码';
    const { data: profile } = await supabaseClient.from('profiles').select('email').eq('username', username).single();
    if (!profile) return err.textContent = '用户名不存在';
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: profile.email, password });
    if (error) return err.textContent = '密码错误或登录失败';
    closeLoginModal();
    currentUser = data.user;
    await fetchProfile();
    render();
  }

  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-error'); err.textContent = '';
    if (!username || !email || !password) return err.textContent = '请填写所有字段';
    if (password.length < 6) return err.textContent = '密码至少6位';
    const { data: exist } = await supabaseClient.from('profiles').select('id').or(`username.eq."${username}",email.eq."${email}"`).maybeSingle();
    if (exist) return err.textContent = '用户名或邮箱已被注册';
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
    if (signUpError) return err.textContent = signUpError.message;
    let userId = signUpData.user?.id;
    if (!userId) return err.textContent = '用户创建失败';
    if (!signUpData.session) {
      const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (loginError) return err.textContent = '自动登录失败，请手动登录';
      userId = loginData.user.id;
    } else await supabaseClient.auth.setSession(signUpData.session);
    const role = (email === '18631167199@163.com') ? 'admin' : 'user';
    const { error: upsertError } = await supabaseClient.from('profiles').upsert({ id: userId, username, email, role });
    if (upsertError) return err.textContent = '个人资料写入失败：' + upsertError.message;
    await supabaseClient.auth.signOut();
    alert('注册成功！请登录');
    closeRegisterModal();
  }

  async function signOut() {
    await supabaseClient.auth.signOut();
    currentUser = null; currentProfile = null;
    render();
  }

  // ===================== 首页（含搜索） =====================
  async function renderHome(container) {
    // 公告
    const { data: announcements } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
    if (announcements?.length) {
      const annCard = document.createElement('div'); annCard.className = 'card';
      annCard.innerHTML = `<strong>📢 公告：</strong>${escapeHtml(announcements[0].content)}<br><small>${new Date(announcements[0].created_at).toLocaleString()}</small>`;
      container.appendChild(annCard);
    }

    // 搜索框
    const searchDiv = document.createElement('div');
    searchDiv.className = 'card';
    searchDiv.innerHTML = `
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索小说标题或作者...">
        <button onclick="searchNovels()">搜索</button>
      </div>
      <div id="search-results" style="margin-top:10px;"></div>`;
    container.appendChild(searchDiv);

    // 加载全部小说，直接显示在搜索框下方（不重复查询）
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    displayNovels(novels || []);
  }

  function displayNovels(novels) {
    const resultsDiv = document.getElementById('search-results');
    if (!resultsDiv) return;
    resultsDiv.innerHTML = '';
    if (!novels.length) {
      resultsDiv.innerHTML = '<p>暂无小说</p>';
      return;
    }
    const listCard = document.createElement('div');
    novels.forEach(n => {
      const item = document.createElement('div'); item.className = 'flex-row';
      item.innerHTML = `
        <div>
          <a onclick="navigate('#novel/${n.id}')" style="font-weight:500;">${escapeHtml(n.title)}</a>
          <div style="font-size:12px; color:#888;">${escapeHtml(n.profiles?.username || '未知')} · ${n.genre || '未分类'} · ${n.status}</div>
        </div>
        <span style="font-size:12px; color:#aaa;">${new Date(n.updated_at).toLocaleDateString()}</span>`;
      resultsDiv.appendChild(item);
    });
  }

  async function searchNovels() {
    const keyword = document.getElementById('search-input').value.trim().toLowerCase();
    if (!keyword) {
      // 空搜索，重新加载全部
      const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
      displayNovels(novels || []);
      return;
    }
    // 客户端过滤
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    const filtered = novels.filter(n => 
      n.title.toLowerCase().includes(keyword) || 
      (n.profiles?.username && n.profiles.username.toLowerCase().includes(keyword))
    );
    displayNovels(filtered);
  }

  // 发布小说
  async function renderNewNovel(container) {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>📝 发布新小说</h2>
      <input id="new-title" placeholder="小说标题">
      <input id="new-genre" placeholder="分类" style="margin-top:8px;">
      <textarea id="new-description" placeholder="简介..." rows="4" style="margin-top:8px;"></textarea>
      <button onclick="publishNovel()" style="width:100%; margin-top:12px;">立即发布</button>
      <div id="publish-error" style="color:red;"></div>`;
    container.appendChild(card);
  }

  async function publishNovel() {
    const title = document.getElementById('new-title').value.trim();
    const genre = document.getElementById('new-genre').value.trim();
    const description = document.getElementById('new-description').value.trim();
    const err = document.getElementById('publish-error');
    if (!title) return err.textContent = '请输入小说标题';
    const { data, error } = await supabaseClient
      .from('novels')
      .insert({ title, genre, description, author_id: currentUser.id, status: '连载中' })
      .select();
    if (error) return err.textContent = '插入失败：' + error.message;
    if (data?.[0]) { alert('发布成功！'); navigate('#home'); }
    else err.textContent = '发布失败，请重试';
  }

  // 小说详情（已修复，并加入删除按钮）
  async function renderNovelDetail(container, novelId) {
    if (!novelId) return container.innerHTML += '<p>错误：未获取到小说ID</p>';

    const { data: novel, error } = await supabaseClient
      .from('novels')
      .select('*, profiles(username)')
      .eq('id', novelId)
      .single();

    if (error) {
      container.innerHTML += `<p>加载失败：${escapeHtml(error.message)}</p>`;
      return;
    }
    if (!novel) {
      container.innerHTML += '<p>小说不存在</p>';
      return;
    }

    const { data: chapters } = await supabaseClient.from('chapters').select('*').eq('novel_id', novelId).order('chapter_number');
    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username)').eq('novel_id', novelId).order('created_at', { ascending: false });
    const { data: ratings } = await supabaseClient.from('ratings').select('score').eq('novel_id', novelId);
    const avg = ratings?.length ? (ratings.reduce((a,b)=>a+b.score,0)/ratings.length).toFixed(1) : '暂无评分';
    const userRating = currentUser ? ratings?.find(r=>r.user_id === currentUser.id) : null;

    const infoCard = document.createElement('div'); infoCard.className = 'card';
    infoCard.innerHTML = `
      <h2>${escapeHtml(novel.title)}</h2>
      <p>作者：${escapeHtml(novel.profiles?.username)} | 状态：${novel.status} | 分类：${novel.genre || '未分类'}</p>
      <p>${escapeHtml(novel.description || '暂无简介')}</p>
      <div class="stars">⭐ ${avg} (${ratings?.length || 0}人评分)</div>
      ${currentUser ? `
        <div style="margin-top:10px;">
          <label>我的评分：</label>
          <select id="my-rating" style="width:auto;">
            <option value="0">未评分</option>
            <option value="1" ${userRating?.score===1?'selected':''}>1星</option>
            <option value="2" ${userRating?.score===2?'selected':''}>2星</option>
            <option value="3" ${userRating?.score===3?'selected':''}>3星</option>
            <option value="4" ${userRating?.score===4?'selected':''}>4星</option>
            <option value="5" ${userRating?.score===5?'selected':''}>5星</option>
          </select>
          <button onclick="rateNovel(${novel.id})">提交评分</button>
        </div>
      ` : '<p>登录后可评分</p>'}
      ${currentUser?.id === novel.author_id ? `
        <div style="margin-top:10px;">
          <button onclick="addChapterPrompt(${novel.id})">添加章节</button>
          <button class="danger" onclick="deleteNovel(${novel.id})" style="margin-left:8px;">删除小说</button>
        </div>
      ` : (currentProfile?.role === 'admin' ? `
        <div style="margin-top:10px;">
          <button class="danger" onclick="deleteNovel(${novel.id})">管理员删除</button>
        </div>
      ` : '')}
    `;
    container.appendChild(infoCard);

    const chapCard = document.createElement('div'); chapCard.className = 'card';
    chapCard.innerHTML = '<h3>📑 章节列表</h3>';
    if (chapters?.length) chapters.forEach(ch => chapCard.innerHTML += `<p><a onclick="readChapter(${ch.id})">第${ch.chapter_number}章 ${escapeHtml(ch.title)}</a></p>`);
    else chapCard.innerHTML += '<p>暂无章节</p>';
    container.appendChild(chapCard);

    const commCard = document.createElement('div'); commCard.className = 'card';
    commCard.innerHTML = '<h3>💬 评论</h3>';
    comments?.forEach(c => commCard.innerHTML += `<div style="margin-bottom:10px;"><strong>${escapeHtml(c.profiles?.username)}</strong>：${escapeHtml(c.content)} <small>${new Date(c.created_at).toLocaleString()}</small></div>`);
    if (currentUser) {
      commCard.innerHTML += `<textarea id="new-comment" placeholder="写下你的评论..." rows="2"></textarea>
        <button onclick="addComment(${novel.id})" style="margin-top:8px;">发表评论</button>`;
    } else commCard.innerHTML += '<p>请先登录发表评论</p>';
    container.appendChild(commCard);
  }

  async function deleteNovel(novelId) {
    if (!confirm('确定删除这部小说吗？所有章节、评论、评分都将被永久删除。')) return;
    const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
    if (error) return alert('删除失败：' + error.message);
    alert('小说已删除');
    navigate('#home');
  }

  async function rateNovel(novelId) {
    const score = parseInt(document.getElementById('my-rating').value);
    if (score === 0) {
      await supabaseClient.from('ratings').delete().eq('novel_id', novelId).eq('user_id', currentUser.id);
      alert('已取消评分');
    } else {
      const { error } = await supabaseClient.from('ratings').upsert({ novel_id: novelId, user_id: currentUser.id, score }, { onConflict: 'novel_id,user_id' });
      if (error) alert(error.message); else alert('评分成功');
    }
    navigate(`#novel/${novelId}`);
  }

  async function addComment(novelId) {
    const content = document.getElementById('new-comment').value.trim();
    if (!content) return alert('评论不能为空');
    const { error } = await supabaseClient.from('comments').insert({ novel_id: novelId, user_id: currentUser.id, content });
    if (error) alert(error.message); else navigate(`#novel/${novelId}`);
  }

  function readChapter(chapterId) {
    supabaseClient.from('chapters').select('*, novels(id)').eq('id', chapterId).single().then(({data:ch})=>{
      const div = document.createElement('div'); div.className = 'card';
      div.innerHTML = `<h3>${escapeHtml(ch.title)}</h3><pre>${escapeHtml(ch.content)}</pre><button onclick="navigate('#novel/${ch.novels.id}')">返回小说</button>`;
      document.getElementById('app').appendChild(div);
    });
  }

  function addChapterPrompt(novelId) {
    const title = prompt('章节标题'); const content = prompt('正文'); const num = prompt('章节序号');
    if (title && content && num) {
      supabaseClient.from('chapters').insert({ novel_id: novelId, title, content, chapter_number: parseInt(num) }).then(({error})=>{
        if (error) alert(error.message); else navigate(`#novel/${novelId}`);
      });
    }
  }

  // 个人中心（含编辑、删除）
  async function renderProfile(container) {
    if (!currentUser) return navigate('#home');
    const back = document.createElement('div'); back.className = 'back-link';
    back.textContent = '← 返回主页'; back.onclick = () => navigate('#home');
    container.appendChild(back);

    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>${escapeHtml(currentProfile.username)} 的个人中心</h2>
      <p>角色：${currentProfile.role === 'admin' ? '管理员' : '用户'}</p>
      <button onclick="changeUsername()">修改用户名</button>
      <h3 style="margin-top:15px;">📖 我发布的小说</h3>
      <div id="my-novels-list" style="margin-top:10px;">加载中...</div>
      <h3 style="margin-top:15px;">💬 我的评论</h3>
      <div id="my-comments-list" style="margin-top:10px;"></div>
      <h3 style="margin-top:15px;">⭐ 我的评分</h3>
      <div id="my-ratings-list" style="margin-top:10px;"></div>
    `;
    container.appendChild(card);

    // 我的小说
    const { data: myNovels } = await supabaseClient.from('novels').select('*').eq('author_id', currentUser.id).order('updated_at', { ascending: false });
    const novelsDiv = document.getElementById('my-novels-list'); novelsDiv.innerHTML = '';
    if (myNovels?.length) {
      myNovels.forEach(n => {
        novelsDiv.innerHTML += `
          <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f0ece4; padding:8px 0;">
            <a onclick="navigate('#novel/${n.id}')">${escapeHtml(n.title)}</a>
            <div>
              <button class="edit-btn" onclick="editNovel(${n.id})">编辑</button>
              <button class="delete-btn" onclick="deleteNovelFromProfile(${n.id})">删除</button>
            </div>
          </div>`;
      });
    } else novelsDiv.innerHTML = '<p>你还没有发布过小说</p>';

    // 我的评论
    const { data: myComments } = await supabaseClient.from('comments').select('*, novels(title)').eq('user_id', currentUser.id);
    document.getElementById('my-comments-list').innerHTML = myComments?.length ? myComments.map(c => `<p>对《${escapeHtml(c.novels.title)}》评论：${escapeHtml(c.content)}</p>`).join('') : '<p>暂无评论</p>';

    // 我的评分
    const { data: myRatings } = await supabaseClient.from('ratings').select('*, novels(title)').eq('user_id', currentUser.id);
    document.getElementById('my-ratings-list').innerHTML = myRatings?.length ? myRatings.map(r => `<p>《${escapeHtml(r.novels.title)}》：${r.score}星</p>`).join('') : '<p>暂无评分</p>';
  }

  async function deleteNovelFromProfile(novelId) {
    if (!confirm('确定删除这部小说吗？所有章节、评论、评分都将被永久删除。')) return;
    const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
    if (error) return alert('删除失败：' + error.message);
    alert('小说已删除');
    navigate('#profile');
  }

  async function editNovel(novelId) {
    const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
    if (!novel) return alert('小说不存在');
    const newTitle = prompt('修改标题', novel.title); if (newTitle === null) return;
    const newGenre = prompt('修改分类', novel.genre || ''); if (newGenre === null) return;
    const newDesc = prompt('修改简介', novel.description || ''); if (newDesc === null) return;
    const { error } = await supabaseClient.from('novels').update({ title: newTitle, genre: newGenre, description: newDesc, updated_at: new Date() }).eq('id', novelId);
    if (error) alert(error.message); else { alert('修改成功'); navigate('#profile'); }
  }

  async function changeUsername() {
    const newName = prompt('新用户名（唯一，不可重复）');
    if (!newName) return;
    const { data: exist } = await supabaseClient.from('profiles').select('id').eq('username', newName).maybeSingle();
    if (exist && exist.id !== currentUser.id) return alert('用户名已存在');
    const { error } = await supabaseClient.from('profiles').update({ username: newName }).eq('id', currentUser.id);
    if (error) alert(error.message); else { alert('用户名已更新'); render(); }
  }

  // 管理员后台
  async function renderAdmin(container) {
    const back = document.createElement('div'); back.className = 'back-link';
    back.textContent = '← 返回主页'; back.onclick = () => navigate('#home');
    container.appendChild(back);

    const tabCard = document.createElement('div'); tabCard.className = 'card';
    tabCard.innerHTML = `
      <button onclick="renderAdminComments()">管理评论</button>
      <button onclick="renderAdminNovels()">管理小说</button>
      <button onclick="renderAdminAdmins()">管理管理员</button>
      <button onclick="editAnnouncement()">编辑公告</button>
    `;
    container.appendChild(tabCard);
    const contentDiv = document.createElement('div'); contentDiv.id = 'admin-content';
    container.appendChild(contentDiv);
    renderAdminComments();
  }

  async function renderAdminComments() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username), novels(title)').order('created_at', { ascending: false });
    if (comments?.length) {
      comments.forEach(c => {
        const div = document.createElement('div'); div.style.borderBottom='1px solid #eee'; div.style.padding='8px 0';
        div.innerHTML = `${escapeHtml(c.profiles?.username)} 评《${escapeHtml(c.novels.title)}》：${escapeHtml(c.content)} <button class="danger" onclick="deleteComment(${c.id})">删除</button>`;
        target.appendChild(div);
      });
    } else target.innerHTML = '<p>暂无评论</p>';
  }

  async function renderAdminNovels() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    if (novels?.length) {
      novels.forEach(n => {
        const div = document.createElement('div'); div.style.borderBottom='1px solid #eee'; div.style.padding='8px 0';
        div.innerHTML = `
          <strong>${escapeHtml(n.title)}</strong> 作者：${escapeHtml(n.profiles?.username)}
          <button class="danger" style="float:right;" onclick="deleteNovelAdmin(${n.id})">删除</button>
          <div style="clear:both;"></div>`;
        target.appendChild(div);
      });
    } else target.innerHTML = '<p>暂无小说</p>';
  }

  async function deleteNovelAdmin(novelId) {
    if (!confirm('管理员强制删除，确定吗？')) return;
    const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
    if (error) alert('删除失败：' + error.message);
    else { alert('已删除'); renderAdminNovels(); }
  }

  async function deleteComment(id) {
    if (!confirm('确认删除？')) return;
    await supabaseClient.from('comments').delete().eq('id', id);
    renderAdminComments();
  }

  async function renderAdminAdmins() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: profiles } = await supabaseClient.from('profiles').select('*');
    if (profiles) {
      profiles.forEach(p => {
        const div = document.createElement('div'); div.style.borderBottom='1px solid #eee'; div.style.padding='8px 0';
        div.innerHTML = `${escapeHtml(p.username)} (${p.role}) `;
        if (p.email !== '18631167199@163.com' && p.id !== currentUser.id) {
          div.innerHTML += `<button onclick="toggleAdmin('${p.id}')">${p.role==='admin'?'撤销管理员':'设为管理员'}</button>`;
        } else if (p.email === '18631167199@163.com') div.innerHTML += '<small>（超级管理员）</small>';
        target.appendChild(div);
      });
    }
  }

  async function toggleAdmin(userId) {
    const { data: p } = await supabaseClient.from('profiles').select('role,email').eq('id', userId).single();
    if (p.email === '18631167199@163.com') return alert('超级管理员不可更改');
    const newRole = p.role === 'admin' ? 'user' : 'admin';
    await supabaseClient.from('profiles').update({ role: newRole }).eq('id', userId);
    renderAdminAdmins();
  }

  async function editAnnouncement() {
    const content = prompt('请输入公告内容');
    if (content) { await supabaseClient.from('announcements').insert({ content }); alert('公告已更新'); }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  render();
</script>
</body>
</html>
