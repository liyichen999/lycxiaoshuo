<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>lyc书库 · 小说社区</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f2eb">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f2eb;color:#3b3226;padding-bottom:70px}
    .container{max-width:800px;margin:0 auto;padding:15px}
    .navbar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:10px 15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
    .logo{font-size:1.3rem;font-weight:bold;color:#6b5b4a;cursor:pointer}
    .user-badge{display:flex;align-items:center;gap:6px}
    .avatar-circle{width:30px;height:30px;border-radius:50%;background:#8b7355;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;overflow:hidden}
    .avatar-circle img{width:100%;height:100%;object-fit:cover}
    .card{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
    .novel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
    .novel-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.05);cursor:pointer;transition:transform 0.2s}
    .novel-card:hover{transform:translateY(-2px)}
    .novel-cover{width:100%;height:180px;object-fit:cover;background:#f0ece4}
    .novel-info{padding:8px}
    .novel-title{font-weight:bold;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .novel-desc{font-size:11px;color:#888;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .novel-author{font-size:11px;color:#aaa;margin-top:2px}
    .flex-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ece4}
    .flex-row:last-child{border-bottom:none}
    button{background:#8b7355;color:#fff;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:13px}
    button.outline{background:transparent;border:1px solid #8b7355;color:#8b7355}
    button.danger{background:#b55}
    input,textarea,select{width:100%;padding:8px;border:1px solid #ddd6c8;border-radius:5px;font-size:14px;margin-top:6px}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal-content{background:#fff;border-radius:12px;padding:25px;min-width:300px;max-width:90%;position:relative;animation:fadeIn 0.2s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .close{position:absolute;top:10px;right:15px;font-size:18px;cursor:pointer;color:#8b7355}
    .hidden{display:none !important}
    a{color:#8b7355;cursor:pointer;text-decoration:none}
    .meta{font-size:12px;color:#888}
    .btn-group{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
    .bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #e0d7c6;display:flex;justify-content:space-around;padding:8px 0;z-index:99}
    .bottom-nav button{background:none;border:none;color:#8b7355;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
    .bottom-nav button.active{color:#3b3226;font-weight:bold}
    .badge{position:absolute;top:0;right:8px;background:red;color:white;border-radius:10px;padding:0 4px;font-size:10px;line-height:16px;min-width:16px;text-align:center;display:none}
    .badge.show{display:inline-block}
    pre{white-space:pre-wrap;font-family:inherit}
    .chapter-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0ece4}
    .chapter-item:last-child{border-bottom:none}
    .nav-chapter{display:flex;justify-content:space-between;margin-top:15px}
    .follow-btn{background:#4a6fa5;font-size:12px;padding:4px 12px}
    .follow-btn.following{background:#aaa}
    .post-item{border-bottom:1px solid #f0ece4;padding:12px 0}
    .post-item:last-child{border-bottom:none}
    .post-title{font-weight:bold}
    .post-meta{font-size:12px;color:#888}
    .vote-btns{display:flex;gap:8px;align-items:center}
    .vote-btns button{background:transparent;border:1px solid #ddd;color:#555;padding:2px 8px;font-size:12px}
    .vote-btns button.active{background:#8b7355;color:#fff;border-color:#8b7355}
    .reply-item{margin-left:20px;margin-top:10px;padding:8px 0;border-bottom:1px solid #f0ece4}
    .reply-item:last-child{border-bottom:none}
    .checkin-btn{background:#4CAF50;font-size:14px}
    .checkin-btn:disabled{background:#aaa}
    .username-label{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:4px;vertical-align:middle;font-weight:bold}
    .label-admin{background:#FFD700;color:#000}
    .label-violator{background:#b55;color:#fff;text-decoration:line-through}
    .msg-list-item{display:flex;align-items:center;padding:12px;border-bottom:1px solid #f0ece4;cursor:pointer;transition:background 0.2s}
    .msg-list-item:hover{background:#faf8f5}
    .msg-avatar{width:45px;height:45px;border-radius:50%;background:#8b7355;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px;overflow:hidden;flex-shrink:0}
    .msg-avatar img{width:100%;height:100%;object-fit:cover}
    .msg-content{flex:1;min-width:0}
    .msg-content .username{font-weight:bold;font-size:16px}
    .msg-content .last-msg{font-size:14px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .msg-time{font-size:12px;color:#aaa;white-space:nowrap}
    .unread-dot{width:8px;height:8px;background:#f00;border-radius:50%;display:inline-block;margin-left:6px}
    .chat-header{display:flex;align-items:center;padding:12px 15px;background:#fff;border-bottom:1px solid #f0ece4;position:sticky;top:0;z-index:10}
    .chat-body{padding:15px;overflow-y:auto;flex:1;max-height:calc(100vh - 220px)}
    .chat-input-area{display:flex;padding:10px;background:#fff;border-top:1px solid #f0ece4;position:sticky;bottom:0}
    .chat-input-area textarea{flex:1;border:1px solid #ddd;border-radius:5px;padding:8px;resize:none}
    .chat-bubble{margin-bottom:15px;display:flex}
    .chat-bubble.mine{justify-content:flex-end}
    .chat-bubble .bubble{max-width:75%;padding:10px 15px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap;overflow-wrap:break-word}
    .chat-bubble.mine .bubble{background:#8b7355;color:#fff;border-bottom-right-radius:4px}
    .chat-bubble.other .bubble{background:#fff;color:#000;border:1px solid #e0e0e0;border-bottom-left-radius:4px}
    .chat-bubble .time{font-size:11px;color:#aaa;margin-top:4px}
    .speech-start-btn{background:#4a6fa5;color:#fff;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
    .speech-controls{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#fff;border-radius:30px;box-shadow:0 4px 15px rgba(0,0,0,0.2);padding:10px 20px;display:none;align-items:center;gap:12px;z-index:102;flex-wrap:wrap;justify-content:center}
    .speech-controls.show{display:flex}
    .speech-controls button{background:none;border:none;font-size:20px;cursor:pointer;padding:6px 10px;border-radius:20px;color:#3b3226}
    .speech-controls button.active{background:#8b7355;color:#fff}
    .speech-controls select{padding:6px 12px;border-radius:15px;border:1px solid #ddd;font-size:14px;max-width:150px}
    @media(max-width:400px){.novel-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app"></div>
<nav class="bottom-nav" id="bottom-nav">
  <button onclick="navigate('#home')" class="active"><span>🏠</span>首页</button>
  <button onclick="navigate('#community')"><span>💬</span>社区</button>
  <button onclick="navigate('#new-novel')"><span>✏️</span>发布</button>
  <button onclick="navigate('#messages')" id="msg-nav-btn"><span>✉️</span>私信 <span class="badge" id="msg-badge"></span></button>
  <button onclick="navigate('#profile')"><span>👤</span>我的</button>
  <button id="admin-nav" class="hidden" onclick="navigate('#admin')"><span>⚙️</span>后台</button>
</nav>
<div id="modal-container"></div>
<div class="speech-controls" id="speech-controls">
  <button id="speech-play" title="播放/暂停">▶️</button>
  <button id="speech-stop" title="停止">⏹️</button>
  <select id="speech-rate" title="语速"><option value="0.8">慢速</option><option value="1" selected>正常</option><option value="1.3">快速</option></select>
  <select id="speech-voice" title="选择语音"></select>
</div>

<script>
const SUPABASE_URL = 'https://srbibtnvtpygegmtehzb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8ET2ng5O0n6phqCtoz3bxA_xTn2cTsi';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const PLACEHOLDER_IMAGE = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22180%22%3E%3Crect fill=%22%23f0ece4%22 width=%22150%22 height=%22180%22/%3E%3C/svg%3E';

let user = null, profile = null, rendering = false;
let currentSpeech = null, sentences = [], currentSentenceIndex = 0, selectedRate = 1;
let voices = [];
const speechControls = document.getElementById('speech-controls');
const BANNED_WORDS = ['广告','赌博','色情','敏感词','违法','政治'];

function loadVoices(){return new Promise(resolve=>{let v=speechSynthesis.getVoices();if(v.length){voices=v;resolve(voices)}else{speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();resolve(voices)}}})}
async function populateVoiceSelector(){
  await loadVoices();
  const s=document.getElementById('speech-voice');
  if(!s)return;
  s.innerHTML='';
  const zh=voices.filter(v=>v.lang.startsWith('zh'));
  if(!zh.length){s.innerHTML='<option value="">默认语音</option>';return}
  zh.sort((a,b)=>(a.name.includes('Microsoft')||a.name.includes('Natural')?-1:1)-(b.name.includes('Microsoft')||b.name.includes('Natural')?-1:1));
  zh.forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=v.name+(v.default?'(默认)':'');s.appendChild(o)});
  s.selectedIndex=0;
}
function containsBanned(text){return BANNED_WORDS.some(w=>text.includes(w))}
function isContentValid(title,content){if(!title||title.length<2)return false;if(!content||content.length<3)return false;if(/^(.)\1+$/.test(content))return false;if(/^[\s\p{P}]+$/u.test(content))return false;return true}
function isMuted(p){return p?.muted_until&&new Date(p.muted_until)>new Date()}
async function addViolation(userId,reason){await supabaseClient.from('user_violations').insert({user_id:userId,reason});const{data:p}=await supabaseClient.from('profiles').select('violation_count').eq('id',userId).single();let count=(p?.violation_count||0)+1;let muted_until=null;if(count>=3)muted_until=new Date(Date.now()+86400000).toISOString();await supabaseClient.from('profiles').update({violation_count:count,muted_until}).eq('id',userId)}
async function getUserNameColor(pd){if(!pd)return'#3b3226';if(isMuted(pd))return'#8B6914';if(pd.role==='admin')return'#FFD700';const{data:novels}=await supabaseClient.from('novels').select('id').eq('author_id',pd.id);const novelCount=novels?.length||0;const{count:checkinCount}=await supabaseClient.from('daily_checkins').select('*',{count:'exact',head:true}).eq('user_id',pd.id);const days=checkinCount||0;const{data:ratings}=await supabaseClient.from('ratings').select('score').eq('user_id',pd.id);const totalScore=ratings?.reduce((s,r)=>s+r.score,0)||0;const points=novelCount*10+days*2+totalScore;if(points>=100)return'#FF8C00';if(points>=50)return'#4682B4';if(points>=20)return'#32CD32';return'#3b3226'}
async function getUserLabel(pd){if(!pd)return'';if(isMuted(pd))return'<span class="username-label label-violator">违规者</span>';if(pd.label)return`<span class="username-label label-admin">${esc(pd.label)}</span>`;return''}
async function formatUsername(pd,show=true){if(!pd)return'未知';const color=await getUserNameColor(pd);let label=show?await getUserLabel(pd):'';return`<span style="color:${color};font-weight:bold;">${esc(pd.username)}</span> ${label}`}
function navigate(hash){window.location.hash=hash}
window.onhashchange=()=>render();

async function render(){
  if(rendering)return;
  stopSpeech(true);
  rendering=true;
  const app=document.getElementById('app');app.innerHTML='';
  const{data:{session}}=await supabaseClient.auth.getSession();
  if(session){user=session.user;await loadProfile()}else{user=null;profile=null}
  updateMessageBadge();
  const nav=document.createElement('div');nav.className='navbar';
  nav.innerHTML=`<span class="logo" onclick="navigate('#home')">📖 lyc书库</span>`;
  if(user&&profile){
    const avatarHtml=profile.avatar_url?`<img src="${profile.avatar_url}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none';this.parentElement.textContent='${profile.username[0]}'">`:profile.username[0];
    const formatted=await formatUsername(profile,true);
    nav.innerHTML+=`<div class="user-badge"><a onclick="navigate('#user/${esc(profile.username)}')" style="display:flex;align-items:center;gap:4px;"><div class="avatar-circle">${avatarHtml}</div> ${formatted}</a><button onclick="signOut()" style="font-size:11px;padding:3px 8px;">退出</button></div>`;
  }else{
    nav.innerHTML+=`<div><button onclick="openModal('login')">登录</button><button onclick="openModal('register')" style="margin-left:4px;">注册</button></div>`;
  }
  app.appendChild(nav);
  document.getElementById('admin-nav').classList.toggle('hidden',profile?.role!=='admin');
  const hash=location.hash||'#home';
  if(hash==='#home')await home(app);
  else if(hash.startsWith('#novel/')){const parts=hash.split('/');if(parts.length===3&&parts[2]==='chapters')await chapterList(app,parts[1]);else await novelDetail(app,parts[1])}
  else if(hash.startsWith('#chapter/'))await chapterContent(app,hash.split('/')[1]);
  else if(hash.startsWith('#user/'))await userPage(app,hash.split('/')[1]);
  else if(hash==='#community')await communityList(app);
  else if(hash.startsWith('#post/'))await postDetail(app,hash.split('/')[1]);
  else if(hash==='#messages')await messagesPage(app);
  else if(hash.startsWith('#chat/'))await chatPage(app,hash.split('/')[1]);
  else if(hash==='#new-novel')await newNovel(app);
  else if(hash==='#profile')await myProfile(app);
  else if(hash==='#admin'&&profile?.role==='admin')await adminPanel(app);
  else home(app);
  rendering=false;
}

async function loadProfile(){if(!user)return;const{data}=await supabaseClient.from('profiles').select('*').eq('id',user.id).single();profile=data||null}
function openModal(type,data){
  const c=document.getElementById('modal-container');
  if(type==='login')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>登录</h3><input id="luser" placeholder="用户名"><input id="lpass" type="password" placeholder="密码" style="margin-top:8px;"><button onclick="doLogin()" style="width:100%;margin-top:12px;">登录</button><div id="err" style="color:red;"></div></div></div>`;
  else if(type==='register')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>注册</h3><input id="ruser" placeholder="用户名"><input id="remail" placeholder="邮箱" style="margin-top:8px;"><input id="rpass" type="password" placeholder="密码(6位+)" style="margin-top:8px;"><button onclick="doRegister()" style="width:100%;margin-top:12px;">注册</button><div id="err" style="color:red;"></div></div></div>`;
  else if(type==='change-password')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>修改密码</h3><input id="newpw" type="password" placeholder="新密码(至少6位)"><button onclick="changePassword()" style="width:100%;margin-top:12px;">确认修改</button><div id="err" style="color:red;"></div></div></div>`;
  else if(type==='upload-avatar')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>上传头像</h3><input type="file" id="avatar-file" accept="image/*"><button onclick="uploadAvatar()" style="width:100%;margin-top:12px;">上传</button><div id="err" style="color:red;"></div></div></div>`;
  else if(type==='upload-cover')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>上传封面</h3><input type="file" id="cover-file" accept="image/*"><button onclick="uploadCover('${data}')" style="width:100%;margin-top:12px;">上传</button><div id="err" style="color:red;"></div></div></div>`;
  else if(type==='edit-bio')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>编辑个人简介</h3><textarea id="bio-text" rows="4" placeholder="介绍一下自己...">${esc(profile?.bio||'')}</textarea><button onclick="saveBio()" style="width:100%;margin-top:12px;">保存</button><div id="err" style="color:red;"></div></div></div>`;
  else if(type==='edit-label')c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>编辑标签</h3><input id="new-label" value="${esc(profile?.label||'')}" placeholder="输入标签"><button onclick="updateLabel()" style="width:100%;margin-top:12px;">保存</button><div id="err" style="color:red;"></div></div></div>`;
}
function closeModal(){document.getElementById('modal-container').innerHTML=''}

async function doLogin(){
  const u=document.getElementById('luser').value.trim(),p=document.getElementById('lpass').value,e=document.getElementById('err');
  if(!u||!p)return e.textContent='请输入用户名和密码';
  const{data:pf}=await supabaseClient.from('profiles').select('email').eq('username',u).single();
  if(!pf)return e.textContent='用户名不存在';
  const{data,error}=await supabaseClient.auth.signInWithPassword({email:pf.email,password:p});
  if(error)return e.textContent='密码错误';
  closeModal();user=data.user;await loadProfile();render();
}
async function doRegister(){
  const u=document.getElementById('ruser').value.trim(),em=document.getElementById('remail').value.trim(),pw=document.getElementById('rpass').value,e=document.getElementById('err');e.textContent='';
  if(!u||!em||!pw)return e.textContent='请填写完整';
  if(pw.length<6)return e.textContent='密码至少6位';
  const{data:exist}=await supabaseClient.from('profiles').select('id').or(`username.eq."${u}",email.eq."${em}"`).maybeSingle();
  if(exist)return e.textContent='用户名或邮箱已被注册';
  const{data:signUpData,error:signUpError}=await supabaseClient.auth.signUp({email:em,password:pw});
  if(signUpError)return e.textContent=signUpError.message;
  if(!signUpData?.user)return e.textContent='注册失败';
  if(!signUpData.session){const{data:loginData,error:loginError}=await supabaseClient.auth.signInWithPassword({email:em,password:pw});if(loginError){closeModal();alert('注册成功！请手动登录');return render()}user=loginData.user}
  else{await supabaseClient.auth.setSession(signUpData.session);user=signUpData.user}
  const role=em==='18631167199@163.com'?'admin':'user',label=role==='admin'?'管理员':'',changes=role==='admin'?(em==='18631167199@163.com'?999:1):0;
  await supabaseClient.from('profiles').upsert({id:user.id,username:u,email:em,role,label,label_changes_remaining:changes});
  closeModal();await loadProfile();render();
}
async function changePassword(){
  const pw=document.getElementById('newpw').value,e=document.getElementById('err');
  if(!pw||pw.length<6)return e.textContent='密码至少6位';
  const{error}=await supabaseClient.auth.updateUser({password:pw});
  if(error)return e.textContent=error.message;
  alert('密码修改成功');closeModal();
}
async function uploadAvatar(){
  const file=document.getElementById('avatar-file').files[0],e=document.getElementById('err');
  if(!file)return e.textContent='请选择文件';
  const path=`${user.id}.${file.name.split('.').pop()}`;
  const{error}=await supabaseClient.storage.from('avatars').upload(path,file,{upsert:true});
  if(error)return e.textContent=error.message;
  const{data:{publicUrl}}=supabaseClient.storage.from('avatars').getPublicUrl(path);
  await supabaseClient.from('profiles').update({avatar_url:publicUrl}).eq('id',user.id);
  await loadProfile();closeModal();render();
}
async function uploadCover(novelId){
  const file=document.getElementById('cover-file').files[0],e=document.getElementById('err');
  if(!file)return e.textContent='请选择文件';
  const path=`${novelId}_cover.${file.name.split('.').pop()}`;
  const{error}=await supabaseClient.storage.from('covers').upload(path,file,{upsert:true});
  if(error)return e.textContent=error.message;
  const{data:{publicUrl}}=supabaseClient.storage.from('covers').getPublicUrl(path);
  await supabaseClient.from('novels').update({cover_url:publicUrl}).eq('id',novelId);
  closeModal();navigate(`#novel/${novelId}`);
}
async function saveBio(){
  const bio=document.getElementById('bio-text').value.trim();
  const{error}=await supabaseClient.from('profiles').update({bio}).eq('id',user.id);
  if(error)return document.getElementById('err').textContent=error.message;
  closeModal();await loadProfile();render();
}

  const{data:existing}=await supabaseClient.from('daily_checkins').select('*').eq('user_id',user.id).eq('checkin_date',today).maybeSingle();

  let consecutive=1;
  if(recent&&recent.length){const lastDate=new Date(recent[0].checkin_date);const diff=Math.floor((new Date(today)-lastDate)/(1000*60*60*24));consecutive=diff===1?(recent[0].consecutive_days||0)+1:1}

// ========== 听书系统（全面净化+逐句容错） ==========
function sanitizeText(text){
  if(!text)return'（无内容）';
  let clean=text.replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[(.*?)\]\(.*?\)/g,'$1');
  clean=clean.replace(/[*_~`#]/g,'').replace(/<[^>]*>/g,'');
  clean=clean.replace(/[^\p{L}\p{N}\p{P}\s]/gu,' ');
  clean=clean.replace(/\s+/g,' ').trim();
  // 若净化后为空，返回提示语
  if(!clean)clean='（本段内容无法朗读）';
  // 限制最大长度避免引擎过载
  if(clean.length>5000)clean=clean.substring(0,5000)+'...';
  return clean;
}
function splitSentences(text){
  // 按中文标点分句，保留标点符号
  const raw=text.match(/[^。！？；!?;]+[。！？；!?;]?/g);
  if(!raw||!raw.length)return[text]; // 若无法拆分，直接返回整体
  return raw;
}
function stopSpeech(hide=true){
  if(currentSpeech){
    speechSynthesis.cancel();
    currentSpeech=null;
    sentences=[];
    currentSentenceIndex=0;
  }
  if(hide)speechControls.classList.remove('show');
  const play=document.getElementById('speech-play');
  if(play){play.textContent='▶️';play.classList.remove('active')}
}
async function speakSentence(idx){
  // 防止空句子或索引越界
  if(!sentences.length||idx>=sentences.length){
    stopSpeech(true);
    return;
  }
  const sentence=sentences[idx];
  // 如果句子为空或只有空白，跳过当前句并继续下一句
  if(!sentence||!sentence.trim()){
    currentSentenceIndex++;
    speakSentence(currentSentenceIndex);
    return;
  }
  const utterance=new SpeechSynthesisUtterance(sentence);
  utterance.lang='zh-CN';
  utterance.rate=selectedRate;
  // 设置语音
  const voiceSelect=document.getElementById('speech-voice');
  if(voiceSelect&&voiceSelect.value){
    const selectedVoice=voices.find(v=>v.name===voiceSelect.value);
    if(selectedVoice)utterance.voice=selectedVoice;
  }
  // 事件处理：结束后自动下一句
  utterance.onend=()=>{
    currentSentenceIndex++;
    speakSentence(currentSentenceIndex);
  };
  // 错误处理：若当前句出错（如语音不可用），跳过并继续
  utterance.onerror=(e)=>{
    console.warn('语音错误:',e);
    currentSentenceIndex++;
    speakSentence(currentSentenceIndex);
  };
  currentSpeech=utterance;
  speechSynthesis.speak(utterance);
  document.getElementById('speech-play').textContent='⏸️';
  document.getElementById('speech-play').classList.add('active');
}
async function startSpeech(text){
  stopSpeech(true);
  // 全面净化文本
  const clean=sanitizeText(text);
  sentences=splitSentences(clean);
  currentSentenceIndex=0;
  selectedRate=parseFloat(document.getElementById('speech-rate').value);
  speechControls.classList.add('show');
  // 确保语音列表已加载
  if(!voices.length)await populateVoiceSelector();
  // 开始朗读第一句
  speakSentence(0);
}
function setupSpeechControls(text){
  const play=document.getElementById('speech-play');
  const stop=document.getElementById('speech-stop');
  const rate=document.getElementById('speech-rate');
  const voice=document.getElementById('speech-voice');

  play.onclick=()=>{
    if(currentSpeech){
      if(speechSynthesis.speaking&&!speechSynthesis.paused){
        speechSynthesis.pause();
        play.textContent='▶️';
        play.classList.remove('active');
      }else if(speechSynthesis.paused){
        speechSynthesis.resume();
        play.textContent='⏸️';
        play.classList.add('active');
      }else{
        // 已经结束，重新开始
        startSpeech(text);
      }
    }else{
      startSpeech(text);
    }
  };
  stop.onclick=()=>stopSpeech(true);
  rate.onchange=()=>{
    if(currentSpeech){
      selectedRate=parseFloat(rate.value);
      const idx=currentSentenceIndex;
      stopSpeech(false);
      currentSentenceIndex=idx;
      speakSentence(idx);
    }
  };
  voice.onchange=()=>{
    if(currentSpeech){
      const idx=currentSentenceIndex;
      stopSpeech(false);
      currentSentenceIndex=idx;
      speakSentence(idx);
    }
  };
}

  async function messagesPage(container) {
    if (!user) return container.innerHTML = '<p>请先登录</p>';
    const searchCard = document.createElement('div'); searchCard.className = 'card';
    searchCard.innerHTML = `<h2>✉️ 私信</h2><input id="msg-search" placeholder="搜索用户名发起私信..."><div id="msg-search-results" style="margin-top:10px;"></div>`;
    container.appendChild(searchCard);

    const { data: msgs } = await supabaseClient.from('pm').select('*').or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`).order('created_at', { ascending: false });
    const conversations = new Map();
    if (msgs) {
      msgs.forEach(m => {
        const otherId = m.sender_id === user.id ? m.receiver_id : m.sender_id;
        if (!conversations.has(otherId) || new Date(m.created_at) > new Date(conversations.get(otherId).created_at)) {
          conversations.set(otherId, m);
        }
      });
    }
    const userIds = Array.from(conversations.keys());
    if (userIds.length > 0) {
      const { data: profiles } = await supabaseClient.from('profiles').select('*').in('id', userIds);
      const listCard = document.createElement('div'); listCard.className = 'card';
      listCard.innerHTML = '<h3>最近会话</h3>';
      if (profiles) {
        for (const p of profiles) {
          const lastMsg = conversations.get(p.id);
          const unread = lastMsg && !lastMsg.is_read && lastMsg.receiver_id === user.id;
          const avatarHtml = p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;">` : p.username[0];
          const div = document.createElement('div');
          div.className = 'msg-list-item';
          div.onclick = () => navigate(`#chat/${p.id}`);
          div.innerHTML = `
            <div class="msg-avatar">${avatarHtml}</div>
            <div class="msg-content">
              <div class="username" style="display:flex;align-items:center;">${esc(p.username)} ${unread ? '<span class="unread-dot"></span>' : ''}</div>
              <div class="last-msg">${esc(lastMsg?.content?.substring(0,40) || '')}</div>
            </div>
            <div class="msg-time">${lastMsg ? new Date(lastMsg.created_at).toLocaleTimeString() : ''}</div>
          `;
          listCard.appendChild(div);
        }
      }
      container.appendChild(listCard);
    } else {
      container.innerHTML += '<p style="text-align:center;color:#888;">暂无消息</p>';
    }

    const inp = document.getElementById('msg-search');
    if (inp) {
      inp.addEventListener('input', async () => {
        const kw = inp.value.trim();
        const resultsDiv = document.getElementById('msg-search-results');
        if (!kw) { resultsDiv.innerHTML = ''; return; }
        const { data: users } = await supabaseClient.from('profiles').select('*').ilike('username', `%${kw}%`).neq('id', user.id).limit(5);
        resultsDiv.innerHTML = '';
        if (users) {
          users.forEach(u => {
            resultsDiv.innerHTML += `<div class="msg-list-item" onclick="navigate('#chat/${u.id}')"><div class="msg-avatar">${u.username[0]}</div><div class="msg-content"><div class="username">${esc(u.username)}</div></div></div>`;
          });
        }
      });
    }
  }

  async function chatPage(container, partnerId) {
    if (!user) return container.innerHTML = '<p>请先登录</p>';
    const { data: partner } = await supabaseClient.from('profiles').select('*').eq('id', partnerId).single();
    if (!partner) return container.innerHTML += '<p>用户不存在</p>';

    const { data: unreadMsgs } = await supabaseClient.from('pm').select('id').eq('sender_id', partnerId).eq('receiver_id', user.id).eq('is_read', false);
    if (unreadMsgs?.length) {
      await supabaseClient.from('pm').update({ is_read: true }).in('id', unreadMsgs.map(m => m.id));
    }

    const { data: msgs } = await supabaseClient.from('pm').select('*').or(`and(sender_id.eq.${user.id},receiver_id.eq.${partnerId}),and(sender_id.eq.${partnerId},receiver_id.eq.${user.id})`).order('created_at', { ascending: true });

    const avatarHtml = partner.avatar_url ? `<img src="${partner.avatar_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">` : partner.username[0];
    const header = document.createElement('div');
    header.className = 'chat-header';
    header.innerHTML = `<div class="msg-avatar" style="width:40px;height:40px;font-size:16px;margin-right:10px;">${avatarHtml}</div><div style="font-weight:bold;font-size:18px;">${esc(partner.username)}</div><button onclick="navigate('#messages')" style="margin-left:auto;">返回</button>`;
    container.appendChild(header);

    const body = document.createElement('div');
    body.className = 'chat-body';
    if (msgs?.length) {
      msgs.forEach(m => {
        const isMe = m.sender_id === user.id;
        const div = document.createElement('div');
        div.className = `chat-bubble ${isMe ? 'mine' : 'other'}`;
        div.innerHTML = `<div><div class="bubble">${esc(m.content)}</div><div class="time">${new Date(m.created_at).toLocaleTimeString()}</div></div>`;
        body.appendChild(div);
      });
    } else {
      body.innerHTML = '<p style="text-align:center;color:#888;">暂无消息</p>';
    }
    container.appendChild(body);

    const inputArea = document.createElement('div');
    inputArea.className = 'chat-input-area';
    inputArea.innerHTML = `<textarea id="msg-input" rows="2" placeholder="输入消息..."></textarea><button id="send-btn" style="margin-left:8px;padding:10px 16px;">发送</button>`;
    container.appendChild(inputArea);

    document.getElementById('send-btn').onclick = async () => {
      const content = document.getElementById('msg-input').value.trim();
      if (!content) return;
      const { error } = await supabaseClient.from('pm').insert({ sender_id: user.id, receiver_id: partnerId, content });
      if (error) { alert('发送失败：' + error.message); }
      else { render(); }
    };

    setTimeout(() => { body.scrollTop = body.scrollHeight; }, 100);
  }

  async function adminMessages() {
    if (profile?.email !== '18631167199@163.com') return;
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data: messages } = await supabaseClient.from('pm').select('*').order('created_at', { ascending: false }).limit(100);
    if (!messages) { c.innerHTML = '<p>暂无私信记录</p>'; return; }
    const userIds = [...new Set([...messages.map(m=>m.sender_id), ...messages.map(m=>m.receiver_id)])];
    const { data: profiles } = await supabaseClient.from('profiles').select('id,username').in('id', userIds);
    const userMap = {};
    if (profiles) profiles.forEach(p => userMap[p.id] = p.username);

      const receiverName = userMap[m.receiver_id] || '未知';
      c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;"><b>${esc(senderName)}</b> → <b>${esc(receiverName)}</b>：${esc(m.content)} <small>${new Date(m.created_at).toLocaleString()}</small></div>`;
    });
  }

    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data: users } = await supabaseClient.from('profiles').select('*').order('username');
    if (!users) { c.innerHTML = '<p>暂无用户</p>'; return; }
    for (const u of users) {
      const formatted = await formatUsername(u, true);
      c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;">${formatted} (${u.role}) <button onclick="editUserLabel('${u.id}')">编辑标签</button> <button onclick="toggleMute('${u.id}')">${isMuted(u)?'解除禁言':'禁言1天'}</button> <button class="danger" onclick="resetViolations('${u.id}')">清零违规</button></div>`;
    }
  }

  function editUserLabel(userId) {
    supabaseClient.from('profiles').select('label').eq('id', userId).single().then(({data}) => {
      const currentLabel = data?.label || '';
      openGenericForm('编辑用户标签', `<input id="editlabel" value="${esc(currentLabel)}" placeholder="标签内容">`, async () => {
        const newLabel = document.getElementById('editlabel').value.trim();
        await supabaseClient.from('profiles').update({ label: newLabel }).eq('id', userId);
        alert('标签已更新'); adminUsers();
      });
    });
  }

  async function toggleMute(userId) {
    const { data: p } = await supabaseClient.from('profiles').select('muted_until').eq('id', userId).single();
    const muted = p?.muted_until && new Date(p.muted_until) > new Date();
    if (muted) await supabaseClient.from('profiles').update({ muted_until: null }).eq('id', userId);
    else await supabaseClient.from('profiles').update({ muted_until: new Date(Date.now() + 86400000).toISOString() }).eq('id', userId);
    alert(muted ? '已解除禁言' : '已禁言1天'); adminUsers();
  }

  async function resetViolations(userId) { await supabaseClient.from('profiles').update({ violation_count: 0, muted_until: null }).eq('id', userId); alert('违规记录已清零'); adminUsers(); }

  async function adminComments() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data } = await supabaseClient.from('comments').select('*, profiles(username), novels(title)').order('created_at', { ascending: false });
    if (data?.length) data.forEach(d => c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;">${esc(d.profiles?.username)} 评《${esc(d.novels.title)}》：${esc(d.content)} <button class="danger" onclick="deleteComment(${d.id})">删除</button></div>`);
    else c.innerHTML = '<p>暂无评论</p>';
  }
  async function deleteComment(id) { if (confirm('删除？')) { await supabaseClient.from('comments').delete().eq('id', id); adminComments(); } }

  async function adminNovels() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    if (data?.length) data.forEach(d => c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;"><b>${esc(d.title)}</b> 作者：${esc(d.profiles?.username)} <button class="danger" style="float:right;" onclick="deleteNovelAdmin('${d.id}')">删除</button></div>`);
    else c.innerHTML = '<p>暂无小说</p>';
  }
  async function deleteNovelAdmin(id) { if (confirm('强制删除？')) { await supabaseClient.from('novels').delete().eq('id', id); adminNovels(); } }

  async function adminPosts() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data: posts } = await supabaseClient.from('posts').select('*, profiles(username)').order('created_at', { ascending: false });
    if (posts?.length) posts.forEach(p => c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;"><b>${esc(p.title)}</b> 作者：${esc(p.profiles?.username)} <button class="danger" onclick="deletePost(${p.id})">删除</button></div>`);
    else c.innerHTML = '<p>暂无帖子</p>';
  }

  async function adminAdmins() {
    const c = document.getElementById('admin-content'); c.innerHTML = '';
    const { data: profiles } = await supabaseClient.from('profiles').select('*');
    if (profiles) profiles.forEach(p => {
      c.innerHTML += `<div style="border-bottom:1px solid #eee;padding:8px 0;">${esc(p.username)} (${p.role}) ${p.email!=='18631167199@163.com'&&p.id!==user.id?`<button onclick="toggleAdmin('${p.id}')">${p.role==='admin'?'撤销':'设为'}管理员</button>`:'<small>（超级管理员）</small>'}</div>`;
    });
  }
  async function toggleAdmin(userId) {
    const { data: p } = await supabaseClient.from('profiles').select('role,email').eq('id', userId).single();
    if (p.email==='18631167199@163.com') return alert('超级管理员不可更改');
    await supabaseClient.from('profiles').update({ role: p.role==='admin'?'user':'admin' }).eq('id', userId);
    adminAdmins();
  }

  function editAnnouncement() {
    openGenericForm('编辑公告（支持 Markdown）', `<textarea id="ann" rows="6" placeholder="公告内容..."></textarea><small>支持 Markdown 语法</small>`, async () => {
      const content = document.getElementById('ann').value.trim();
      if (!content) throw new Error('公告不能为空');
      await supabaseClient.from('announcements').insert({ content });
      alert('公告已更新');
    });
  }


// 通用工具
function openGenericForm(title,html,cb){const c=document.getElementById('modal-container');c.innerHTML=`<div class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><h3>${title}</h3><div id="generic-form-body">${html}</div><button id="generic-submit" onclick="submitGenericForm()" style="width:100%;margin-top:12px;">提交</button><div id="generic-err" style="color:red;"></div></div></div>`;window.__genericCallback=cb}
function submitGenericForm(){const cb=window.__genericCallback;if(!cb)return;const err=document.getElementById('generic-err');if(err)err.textContent='';cb().then(()=>closeModal()).catch(e=>{if(err)err.textContent=e.message})}
function showConfirm(msg,onConfirm){const c=document.getElementById('modal-container');c.innerHTML=`<div class="modal"><div class="modal-content" style="text-align:center;"><p>${msg}</p><div class="btn-group" style="justify-content:center;margin-top:15px;"><button class="outline" onclick="closeModal()">取消</button><button class="danger" id="confirm-ok">确认</button></div></div></div>`;document.getElementById('confirm-ok').onclick=()=>{closeModal();onConfirm()}}
function esc(text){const d=document.createElement('div');d.textContent=text;return d.innerHTML}

// PWA
let deferredPrompt=null;const installBanner=document.getElementById('install-banner');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(installBanner)installBanner.classList.remove('hidden')});
window.addEventListener('appinstalled',()=>{deferredPrompt=null;if(installBanner)installBanner.classList.add('hidden')});
function promptInstall(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;if(installBanner)installBanner.classList.add('hidden')})}
if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js');

if(typeof marked!=='undefined')marked.setOptions({breaks:true,gfm:true});
populateVoiceSelector();render();
</script>
