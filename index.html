<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>lyc书库 · 小说社区</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f2eb; color:#3b3226; padding-bottom:70px; }
    .container { max-width:800px; margin:0 auto; padding:15px; }
    .navbar { display:flex; justify-content:space-between; align-items:center; background:#fff; padding:10px 15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    .logo { font-size:1.3rem; font-weight:bold; color:#6b5b4a; cursor:pointer; }
    .user-badge { display:flex; align-items:center; gap:6px; }
    .avatar-circle { width:30px; height:30px; border-radius:50%; background:#8b7355; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; overflow:hidden; }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; }
    .card { background:#fff; border-radius:10px; padding:15px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    .novel-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
    .novel-card { background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.05); cursor:pointer; transition:transform 0.2s; }
    .novel-card:hover { transform:translateY(-2px); }
    .novel-cover { width:100%; height:180px; object-fit:cover; background:#f0ece4; }
    .novel-info { padding:8px; }
    .novel-title { font-weight:bold; font-size:13px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .novel-desc { font-size:11px; color:#888; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .novel-author { font-size:11px; color:#aaa; margin-top:2px; }
    .flex-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0ece4; }
    .flex-row:last-child { border-bottom:none; }
    button { background:#8b7355; color:#fff; border:none; padding:6px 14px; border-radius:5px; cursor:pointer; font-size:13px; }
    button.outline { background:transparent; border:1px solid #8b7355; color:#8b7355; }
    button.danger { background:#b55; }
    input,textarea,select { width:100%; padding:8px; border:1px solid #ddd6c8; border-radius:5px; font-size:14px; margin-top:6px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-content { background:#fff; border-radius:12px; padding:25px; min-width:300px; max-width:90%; position:relative; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .close { position:absolute; top:10px; right:15px; font-size:18px; cursor:pointer; color:#8b7355; }
    .hidden { display:none !important; }
    a { color:#8b7355; cursor:pointer; text-decoration:none; }
    .meta { font-size:12px; color:#888; }
    .btn-group { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
    .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:#fff; border-top:1px solid #e0d7c6; display:flex; justify-content:space-around; padding:8px 0; z-index:99; }
    .bottom-nav button { background:none; border:none; color:#8b7355; font-size:12px; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .bottom-nav button.active { color:#3b3226; font-weight:bold; }
    pre { white-space:pre-wrap; font-family:inherit; }
    .rank-list { list-style:none; }
    .rank-list li { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #f0ece4; }
    .rank-list li:last-child { border-bottom:none; }
    .rank-num { font-size:18px; font-weight:bold; color:#8b7355; width:24px; text-align:center; }
    .chapter-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0ece4; }
    .chapter-item:last-child { border-bottom:none; }
    .nav-chapter { display:flex; justify-content:space-between; margin-top:15px; }
    @media (max-width:400px) { .novel-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app"></div>
<nav class="bottom-nav" id="bottom-nav">
  <button onclick="navigate('#home')" class="active"><span>🏠</span>首页</button>
  <button onclick="navigate('#new-novel')"><span>✏️</span>发布</button>
  <button onclick="navigate('#profile')"><span>👤</span>我的</button>
  <button id="admin-nav" class="hidden" onclick="navigate('#admin')"><span>⚙️</span>后台</button>
</nav>
<div id="modal-container"></div>

<script>
  // ===================== 配置 =====================
  const SUPABASE_URL = 'https://srbibtnvtpygegmtehzb.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8ET2ng5O0n6phqCtoz3bxA_xTn2cTsi';
  // 使用 supabaseClient 避免与全局 supabase 冲突
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let user = null, profile = null;
  let rendering = false;

  function navigate(hash) { window.location.hash = hash; }
  window.onhashchange = () => render();

  async function render() {
    if (rendering) return;
    rendering = true;
    const app = document.getElementById('app'); app.innerHTML = '';
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { user = session.user; await loadProfile(); }
    else { user = null; profile = null; }

    // 顶栏
    const nav = document.createElement('div'); nav.className = 'navbar';
    nav.innerHTML = `<span class="logo" onclick="navigate('#home')">📖 lyc书库</span>`;
    if (user && profile) {
      const avatarHtml = profile.avatar_url ? `<img src="${profile.avatar_url}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">` : profile.username[0];
      nav.innerHTML += `<div class="user-badge">
        <a onclick="navigate('#user/${esc(profile.username)}')" style="display:flex;align-items:center;gap:4px;">
          <div class="avatar-circle">${avatarHtml}</div> ${esc(profile.username)}
        </a>
        <button onclick="signOut()" style="font-size:11px;padding:3px 8px;">退出</button>
      </div>`;
    } else {
      nav.innerHTML += `<div><button onclick="openModal('login')">登录</button><button onclick="openModal('register')" style="margin-left:4px;">注册</button></div>`;
    }
    app.appendChild(nav);
    document.getElementById('admin-nav').classList.toggle('hidden', profile?.role !== 'admin');

    // 路由
    const hash = location.hash || '#home';
    if (hash === '#home') await home(app);
    else if (hash.startsWith('#novel/')) {
      const parts = hash.split('/');
      if (parts.length === 3 && parts[2] === 'chapters') await chapterList(app, parts[1]);
      else await novelDetail(app, parts[1]);
    }
    else if (hash.startsWith('#chapter/')) await chapterContent(app, hash.split('/')[1]);
    else if (hash.startsWith('#user/')) await userPage(app, hash.split('/')[1]);
    else if (hash === '#new-novel') await newNovel(app);
    else if (hash === '#profile') await myProfile(app);
    else if (hash === '#admin' && profile?.role === 'admin') await adminPanel(app);
    else home(app);

    rendering = false;
  }

  async function loadProfile() {
    if (!user) return;
    const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    profile = data || null;
  }

  // ========== 通用模态框 ==========
  function openModal(type, data) {
    const container = document.getElementById('modal-container');
    if (type === 'login') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>登录</h3>
        <input id="luser" placeholder="用户名"><input id="lpass" type="password" placeholder="密码" style="margin-top:8px;">
        <button onclick="doLogin()" style="width:100%;margin-top:12px;">登录</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'register') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>注册</h3>
        <input id="ruser" placeholder="用户名"><input id="remail" placeholder="邮箱" style="margin-top:8px;"><input id="rpass" type="password" placeholder="密码(6位+)" style="margin-top:8px;">
        <button onclick="doRegister()" style="width:100%;margin-top:12px;">注册</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'change-password') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>修改密码</h3>
        <input id="newpw" type="password" placeholder="新密码(至少6位)"><button onclick="changePassword()" style="width:100%;margin-top:12px;">确认修改</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'upload-avatar') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>上传头像</h3>
        <input type="file" id="avatar-file" accept="image/*"><button onclick="uploadAvatar()" style="width:100%;margin-top:12px;">上传</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'upload-cover') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>上传封面</h3>
        <input type="file" id="cover-file" accept="image/*"><button onclick="uploadCover('${data}')" style="width:100%;margin-top:12px;">上传</button><div id="err" style="color:red;"></div>
      </div></div>`;
    } else if (type === 'edit-bio') {
      container.innerHTML = `<div class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span><h3>编辑个人简介</h3>
        <textarea id="bio-text" rows="4" placeholder="介绍一下自己...">${esc(profile?.bio || '')}</textarea>
        <button onclick="saveBio()" style="width:100%;margin-top:12px;">保存</button><div id="err" style="color:red;"></div>
      </div></div>`;
    }
  }
  function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

  // ========== 登录/注册 ==========
  async function doLogin() {
    const u = document.getElementById('luser').value.trim(), p = document.getElementById('lpass').value;
    const e = document.getElementById('err');
    if (!u || !p) return e.textContent = '请输入用户名和密码';
    const { data: pf } = await supabaseClient.from('profiles').select('email').eq('username', u).single();
    if (!pf) return e.textContent = '用户名不存在';
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: pf.email, password: p });
    if (error) return e.textContent = '密码错误';
    closeModal();
    user = data.user;
    await loadProfile();
    render();
  }

  async function doRegister() {
    const u = document.getElementById('ruser').value.trim();
    const em = document.getElementById('remail').value.trim();
    const pw = document.getElementById('rpass').value;
    const e = document.getElementById('err'); e.textContent = '';
    if (!u || !em || !pw) return e.textContent = '请填写完整';
    if (pw.length < 6) return e.textContent = '密码至少6位';
    const { data: exist } = await supabaseClient.from('profiles').select('id').or(`username.eq."${u}",email.eq."${em}"`).maybeSingle();
    if (exist) return e.textContent = '用户名或邮箱已被注册';
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email: em, password: pw });
    if (signUpError) return e.textContent = signUpError.message;
    if (!signUpData?.user) return e.textContent = '注册失败';
    // 自动登录
    if (!signUpData.session) {
      const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({ email: em, password: pw });
      if (loginError) { closeModal(); alert('注册成功！请手动登录'); return render(); }
      user = loginData.user;
    } else {
      await supabaseClient.auth.setSession(signUpData.session);
      user = signUpData.user;
    }
    const role = em === '18631167199@163.com' ? 'admin' : 'user';
    await supabaseClient.from('profiles').upsert({ id: user.id, username: u, email: em, role });
    closeModal();
    await loadProfile();
    render();
  }

  async function changePassword() {
    const pw = document.getElementById('newpw').value;
    const e = document.getElementById('err');
    if (!pw || pw.length < 6) return e.textContent = '密码至少6位';
    const { error } = await supabaseClient.auth.updateUser({ password: pw });
    if (error) return e.textContent = error.message;
    alert('密码修改成功');
    closeModal();
  }

  async function uploadAvatar() {
    const file = document.getElementById('avatar-file').files[0];
    const e = document.getElementById('err');
    if (!file) return e.textContent = '请选择文件';
    const path = `${user.id}.${file.name.split('.').pop()}`;
    const { error } = await supabaseClient.storage.from('avatars').upload(path, file, { upsert: true });
    if (error) return e.textContent = error.message;
    const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(path);
    await supabaseClient.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
    await loadProfile();
    closeModal();
    render();
  }

  async function uploadCover(novelId) {
    const file = document.getElementById('cover-file').files[0];
    const e = document.getElementById('err');
    if (!file) return e.textContent = '请选择文件';
    const path = `${novelId}_cover.${file.name.split('.').pop()}`;
    const { error } = await supabaseClient.storage.from('covers').upload(path, file, { upsert: true });
    if (error) return e.textContent = error.message;
    const { data: { publicUrl } } = supabaseClient.storage.from('covers').getPublicUrl(path);
    await supabaseClient.from('novels').update({ cover_url: publicUrl }).eq('id', novelId);
    closeModal();
    navigate(`#novel/${novelId}`);
  }

  async function saveBio() {
    const bio = document.getElementById('bio-text').value.trim();
    const { error } = await supabaseClient.from('profiles').update({ bio }).eq('id', user.id);
    if (error) return document.getElementById('err').textContent = error.message;
    closeModal();
    await loadProfile();
    render();
  }

  async function signOut() { await supabaseClient.auth.signOut(); user = null; profile = null; render(); }

  // ========== 首页 ==========
  async function home(container) {
    // 公告
    const { data: ann } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
    if (ann?.length) {
      const div = document.createElement('div'); div.className = 'card';
      div.innerHTML = `<strong>📢 公告</strong><br>${marked.parse(ann[0].content)}`;
      container.appendChild(div);
    }
    // 搜索
    const searchDiv = document.createElement('div'); searchDiv.className = 'card';
    searchDiv.innerHTML = `<input id="search" placeholder="搜索小说、作者、用户..."><button onclick="search()" style="margin-top:6px;">搜索</button><div id="results" style="margin-top:10px;"></div>`;
    container.appendChild(searchDiv);

    // 巅峰榜
    const { data: allNovels } = await supabaseClient.from('novels').select('*, profiles(username), ratings(score)').order('updated_at', { ascending: false }).limit(50);
    const ranked = allNovels?.map(n => {
      const scores = n.ratings?.map(r=>r.score) || [];
      const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
      return { ...n, avg };
    }).filter(n => n.avg > 0).sort((a,b) => b.avg - a.avg).slice(0,10);
    if (ranked?.length) {
      const rankCard = document.createElement('div'); rankCard.className = 'card';
      rankCard.innerHTML = '<h3>🏆 巅峰榜</h3><ul class="rank-list"></ul>';
      const list = rankCard.querySelector('.rank-list');
      ranked.forEach((n, i) => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="rank-num">${i+1}</span><div style="flex:1;"><a onclick="navigate('#novel/${n.id}')">${esc(n.title)}</a> <span style="font-size:12px;">⭐${n.avg.toFixed(1)}</span></div>`;
        list.appendChild(li);
      });
      container.appendChild(rankCard);
    }

    // 小说网格
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false }).limit(30);
    const grid = document.createElement('div'); grid.className = 'novel-grid';
    if (novels?.length) {
      novels.forEach(n => {
        const card = document.createElement('div'); card.className = 'novel-card';
        card.onclick = () => navigate(`#novel/${n.id}`);
        card.innerHTML = `
          <img class="novel-cover" src="${n.cover_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22180%22%3E%3Crect fill=%22%23f0ece4%22 width=%22150%22 height=%22180%22/%3E%3Ctext fill=%22%23aaa%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22%3E暂无封面%3C/text%3E%3C/svg%3E'}" alt="封面">
          <div class="novel-info">
            <div class="novel-title">${esc(n.title)}</div>
            <div class="novel-desc">${esc(n.description || '暂无简介')}</div>
            <div class="novel-author">${esc(n.profiles?.username)}</div>
          </div>`;
        grid.appendChild(card);
      });
    } else {
      grid.innerHTML = '<p style="color:#888;">还没有小说，快来发布吧！</p>';
    }
    container.appendChild(grid);
  }

  async function search() {
    const kw = document.getElementById('search').value.trim();
    const resultsDiv = document.getElementById('results'); resultsDiv.innerHTML = '';
    if (!kw) return;
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').ilike('title', `%${kw}%`).limit(10);
    const { data: users } = await supabaseClient.from('profiles').select('*').ilike('username', `%${kw}%`).limit(10);
    if (users?.length) {
      resultsDiv.innerHTML += '<b>👥 用户</b>';
      users.forEach(u => resultsDiv.innerHTML += `<div><a onclick="navigate('#user/${esc(u.username)}')">${esc(u.username)}</a></div>`);
    }
    if (novels?.length) {
      resultsDiv.innerHTML += '<b>📚 小说</b>';
      novels.forEach(n => resultsDiv.innerHTML += `<div class="flex-row"><div><a onclick="navigate('#novel/${n.id}')">${esc(n.title)}</a></div><span>${esc(n.profiles?.username)}</span></div>`);
    }
    if (!users?.length && !novels?.length) resultsDiv.innerHTML = '<p>无结果</p>';
  }

  // ========== 小说详情 ==========
  async function novelDetail(container, novelId) {
    const { data: novel } = await supabaseClient.from('novels').select('*, profiles(username)').eq('id', novelId).single();
    if (!novel) return container.innerHTML += '<p>不存在</p>';
    const { data: ratings } = await supabaseClient.from('ratings').select('score').eq('novel_id', novelId);
    const avg = ratings?.length ? (ratings.reduce((a,b)=>a+b.score,0)/ratings.length).toFixed(1) : '-';
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <a onclick="navigate('#home')" style="font-size:12px;">← 首页</a>
      <div style="display:flex; gap:15px; margin-top:10px; flex-wrap:wrap;">
        <img src="${novel.cover_url || 'data:image/svg+xml,...'}" style="width:100px;height:140px;object-fit:cover;border-radius:8px; background:#f0ece4;">
        <div style="flex:1; min-width:200px;">
          <h2>${esc(novel.title)}</h2>
          <p>作者：<a onclick="navigate('#user/${esc(novel.profiles.username)}')">${esc(novel.profiles.username)}</a></p>
          <p>⭐ ${avg} (${ratings?.length||0}人)</p>
          <p>${esc(novel.description||'')}</p>
          <div class="btn-group">
            <button onclick="navigate('#novel/${novelId}/chapters')">📖 章节</button>
            ${user?.id === novel.author_id ? `<button class="outline" onclick="openModal('upload-cover','${novelId}')">🖼️ 上传封面</button>` : ''}
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  }

  // ========== 章节列表、内容等保持（和之前的完整版相同，此处省略，实际部署请复制以前的完整实现） ==========
  // 由于篇幅限制，这里只展示修复冲突的核心代码。完整功能需要将之前回复中的章节、评论、用户主页等函数复制进来。
  // 你可以用下面这个简单补充快速恢复基础功能：

  async function chapterList(container, novelId) {
    container.innerHTML += '<p>章节列表（功能待补充完整代码）</p>';
  }
  async function chapterContent(container, chapterId) {
    container.innerHTML += '<p>章节内容（功能待补充完整代码）</p>';
  }
  async function userPage(container, username) {
    container.innerHTML += '<p>用户主页（功能待补充完整代码）</p>';
  }
  async function newNovel(container) {
    container.innerHTML += '<p>发布小说（功能待补充完整代码）</p>';
  }
  async function myProfile(container) {
    container.innerHTML += '<p>个人中心（功能待补充完整代码）</p>';
  }
  async function adminPanel(container) {
    container.innerHTML += '<p>管理后台（功能待补充完整代码）</p>';
  }

  function esc(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true });

  render();
</script>
</body>
</html>
