<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>lyc书库 · 小说社区</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f2eb; color:#3b3226; }
    .container { max-width:900px; margin:0 auto; padding:20px; }
    .navbar { display:flex; justify-content:space-between; align-items:center; background:#fff; padding:12px 20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .logo { font-size:1.5rem; font-weight:bold; color:#6b5b4a; cursor:pointer; }
    .nav-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .avatar-circle { width:34px; height:34px; border-radius:50%; background:#8b7355; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; }
    .card { background:#fff; border-radius:12px; padding:20px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .flex-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f0ece4; }
    .flex-row:last-child { border-bottom:none; }
    button { background:#8b7355; color:#fff; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:14px; }
    button.outline { background:transparent; border:1px solid #8b7355; color:#8b7355; }
    button.danger { background:#b55; }
    input,textarea,select { width:100%; padding:10px; border:1px solid #ddd6c8; border-radius:6px; font-size:14px; margin-top:8px; }
    .stars { color:#e6b422; font-size:18px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-content { background:#fff; border-radius:16px; padding:30px; min-width:340px; max-width:90%; position:relative; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .close { position:absolute; top:15px; right:20px; font-size:20px; cursor:pointer; color:#8b7355; }
    .hidden { display:none !important; }
    hr { margin:15px 0; border:0.5px solid #eee; }
    .back-link { display:inline-block; margin-bottom:15px; color:#8b7355; cursor:pointer; font-size:14px; }
    a { color:#8b7355; cursor:pointer; text-decoration:none; }
    a:hover { text-decoration:underline; }
    pre { white-space:pre-wrap; font-family:inherit; }
    .section-title { font-size:1.2rem; font-weight:bold; margin-bottom:10px; color:#5b4b3a; }
    .search-box { display:flex; gap:8px; margin-bottom:15px; }
    .meta { font-size:13px; color:#888; }
    .btn-group { display:flex; gap:8px; margin-top:15px; flex-wrap:wrap; }
    .chapter-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0ece4; }
    .chapter-item:last-child { border-bottom:none; }
    .action-btn { padding:4px 12px; font-size:12px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app"></div>

<!-- 登录模态框 -->
<div id="login-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeLoginModal()">&times;</span>
    <h3>登录</h3>
    <input type="text" id="login-username" placeholder="用户名">
    <input type="password" id="login-password" placeholder="密码">
    <button onclick="login()" style="width:100%; margin-top:12px;">登录</button>
    <div id="login-error" style="color:red;"></div>
  </div>
</div>

<!-- 注册模态框 -->
<div id="register-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeRegisterModal()">&times;</span>
    <h3>注册</h3>
    <input type="text" id="reg-username" placeholder="用户名">
    <input type="email" id="reg-email" placeholder="邮箱">
    <input type="password" id="reg-password" placeholder="密码(至少6位)">
    <button onclick="register()" style="width:100%; margin-top:12px;">注册</button>
    <div id="reg-error" style="color:red;"></div>
  </div>
</div>

<!-- 通用表单模态框（用于添加/编辑章节、编辑小说） -->
<div id="form-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeFormModal()">&times;</span>
    <h3 id="form-title">标题</h3>
    <div id="form-body"></div>
    <button id="form-submit" onclick="submitForm()" style="width:100%; margin-top:12px;">提交</button>
    <div id="form-error" style="color:red; margin-top:5px;"></div>
  </div>
</div>

<!-- 通用确认模态框 -->
<div id="confirm-modal" class="modal hidden">
  <div class="modal-content" style="text-align:center;">
    <p id="confirm-message"></p>
    <div class="btn-group" style="justify-content:center; margin-top:20px;">
      <button class="outline" onclick="closeConfirmModal(false)">取消</button>
      <button class="danger" id="confirm-ok">确认</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://srbibtnvtpygegmtehzb.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8ET2ng5O0n6phqCtoz3bxA_xTn2cTsi';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentProfile = null;
  let isRendering = false;

  // 通用表单回调
  let formCallback = null;

  // ===================== 路由 =====================
  function navigate(hash) { window.location.hash = hash; render(); }
  window.onhashchange = () => render();

  async function render() {
    if (isRendering) return;
    isRendering = true;
    const app = document.getElementById('app');
    app.innerHTML = '';

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { currentUser = session.user; await fetchProfile(); }
    else { currentUser = null; currentProfile = null; }

    // 导航栏
    const nav = document.createElement('div'); nav.className = 'navbar';
    nav.innerHTML = `<div class="logo" onclick="navigate('#home')">📖 lyc书库</div><div class="nav-actions" id="nav-actions"></div>`;
    const actions = nav.querySelector('#nav-actions');
    if (currentUser && currentProfile) {
      actions.innerHTML = `
        ${currentProfile.role === 'admin' ? '<button class="outline" onclick="navigate(\'#admin\')">后台</button>' : ''}
        <button class="outline" onclick="navigate('#new-novel')">发布小说</button>
        <button class="outline" onclick="navigate('#profile')">个人中心</button>
        <div class="avatar-circle" title="${escapeHtml(currentProfile.username)}">${escapeHtml(currentProfile.username[0])}</div>
        <button onclick="signOut()">退出</button>`;
    } else {
      actions.innerHTML = `<button onclick="openLoginModal()">登录</button><button onclick="openRegisterModal()">注册</button>`;
    }
    app.appendChild(nav);

    const hash = window.location.hash || '#home';
    if (hash === '#home') await renderHome(app);
    else if (hash.startsWith('#novel/')) {
      const parts = hash.split('/');
      const novelId = parts[1];
      if (parts.length === 3 && parts[2] === 'chapters') await renderChapterList(app, novelId);
      else await renderNovelDetail(app, novelId);
    }
    else if (hash.startsWith('#chapter/')) {
      const chapterId = hash.split('/')[1];
      await renderChapterContent(app, chapterId);
    }
    else if (hash === '#new-novel') await renderNewNovel(app);
    else if (hash === '#profile') await renderProfile(app);
    else if (hash === '#admin' && currentProfile?.role === 'admin') await renderAdmin(app);
    else renderHome(app);

    isRendering = false;
  }

  async function fetchProfile() {
    if (!currentUser) return;
    const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = data || null;
  }

  // ===================== 模态框管理 =====================
  function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
  function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
  function openRegisterModal() { document.getElementById('register-modal').classList.remove('hidden'); }
  function closeRegisterModal() { document.getElementById('register-modal').classList.add('hidden'); }

  function openFormModal(title, html, cb) {
    document.getElementById('form-title').textContent = title;
    document.getElementById('form-body').innerHTML = html;
    document.getElementById('form-modal').classList.remove('hidden');
    document.getElementById('form-error').textContent = '';
    formCallback = cb;
  }
  function closeFormModal() { document.getElementById('form-modal').classList.add('hidden'); formCallback = null; }

  async function submitForm() {
    if (formCallback) {
      const err = document.getElementById('form-error');
      err.textContent = '';
      try {
        await formCallback();
        closeFormModal();
      } catch (e) {
        err.textContent = e.message;
      }
    }
  }

  function showConfirm(message, onConfirm) {
    document.getElementById('confirm-message').textContent = message;
    document.getElementById('confirm-modal').classList.remove('hidden');
    document.getElementById('confirm-ok').onclick = () => {
      document.getElementById('confirm-modal').classList.add('hidden');
      if (onConfirm) onConfirm();
    };
  }
  function closeConfirmModal(confirmed) {
    document.getElementById('confirm-modal').classList.add('hidden');
  }

  // ===================== 登录/注册 =====================
  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error'); err.textContent = '';
    if (!username || !password) return err.textContent = '请输入用户名和密码';
    const { data: profile } = await supabaseClient.from('profiles').select('email').eq('username', username).single();
    if (!profile) return err.textContent = '用户名不存在';
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: profile.email, password });
    if (error) return err.textContent = '密码错误或登录失败';
    closeLoginModal();
    currentUser = data.user;
    await fetchProfile();
    render();
  }

  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-error'); err.textContent = '';
    if (!username || !email || !password) return err.textContent = '请填写所有字段';
    if (password.length < 6) return err.textContent = '密码至少6位';
    const { data: exist } = await supabaseClient.from('profiles').select('id').or(`username.eq."${username}",email.eq."${email}"`).maybeSingle();
    if (exist) return err.textContent = '用户名或邮箱已被注册';
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
    if (signUpError) return err.textContent = signUpError.message;
    let userId = signUpData.user?.id;
    if (!userId) return err.textContent = '用户创建失败';
    if (!signUpData.session) {
      const { data: loginData } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (loginData.error) return err.textContent = '自动登录失败，请手动登录';
      userId = loginData.user.id;
    } else await supabaseClient.auth.setSession(signUpData.session);
    const role = (email === '18631167199@163.com') ? 'admin' : 'user';
    const { error: upsertError } = await supabaseClient.from('profiles').upsert({ id: userId, username, email, role });
    if (upsertError) return err.textContent = '个人资料写入失败：' + upsertError.message;
    await supabaseClient.auth.signOut();
    alert('注册成功！请登录');
    closeRegisterModal();
  }

  async function signOut() {
    await supabaseClient.auth.signOut();
    currentUser = null; currentProfile = null;
    render();
  }

  // ===================== 首页 =====================
  async function renderHome(container) {
    const { data: announcements } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
    if (announcements?.length) {
      const annCard = document.createElement('div'); annCard.className = 'card';
      annCard.innerHTML = `<strong>📢 公告：</strong>${escapeHtml(announcements[0].content)}<br><small>${new Date(announcements[0].created_at).toLocaleString()}</small>`;
      container.appendChild(annCard);
    }
    const searchDiv = document.createElement('div'); searchDiv.className = 'card';
    searchDiv.innerHTML = `
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索小说标题或作者...">
        <button onclick="searchNovels()">搜索</button>
      </div>
      <div id="search-results" style="margin-top:10px;"></div>`;
    container.appendChild(searchDiv);
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    displayNovels(novels || []);
  }

  function displayNovels(novels) {
    const resultsDiv = document.getElementById('search-results');
    if (!resultsDiv) return;
    resultsDiv.innerHTML = '';
    if (!novels.length) { resultsDiv.innerHTML = '<p style="text-align:center; color:#888;">暂无小说</p>'; return; }
    novels.forEach(n => {
      const item = document.createElement('div'); item.className = 'flex-row';
      item.innerHTML = `
        <div style="flex:1;">
          <a onclick="navigate('#novel/${n.id}')" style="font-weight:500;">${escapeHtml(n.title)}</a>
          <div class="meta">${escapeHtml(n.profiles?.username || '未知')} · ${n.genre || '未分类'} · ${n.status}</div>
        </div>
        <span style="font-size:12px; color:#aaa;">${new Date(n.updated_at).toLocaleDateString()}</span>`;
      resultsDiv.appendChild(item);
    });
  }

  async function searchNovels() {
    const keyword = document.getElementById('search-input').value.trim().toLowerCase();
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    const filtered = keyword ? novels.filter(n => n.title.toLowerCase().includes(keyword) || (n.profiles?.username?.toLowerCase().includes(keyword))) : novels;
    displayNovels(filtered);
  }

  // ===================== 小说详情页 =====================
  async function renderNovelDetail(container, novelId) {
    const { data: novel, error } = await supabaseClient.from('novels').select('*, profiles(username)').eq('id', novelId).single();
    if (error || !novel) { container.innerHTML += '<p>小说不存在</p>'; return; }
    const { data: ratings } = await supabaseClient.from('ratings').select('score').eq('novel_id', novelId);
    const avg = ratings?.length ? (ratings.reduce((a,b)=>a+b.score,0)/ratings.length).toFixed(1) : '暂无评分';

    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <a class="back-link" onclick="navigate('#home')">← 返回首页</a>
      <h2>${escapeHtml(novel.title)}</h2>
      <p class="meta">作者：${escapeHtml(novel.profiles?.username)} | 状态：${novel.status} | 分类：${novel.genre || '未分类'}</p>
      <p>${escapeHtml(novel.description || '暂无简介')}</p>
      <div class="stars">⭐ ${avg} (${ratings?.length || 0}人评分)</div>
      <div class="btn-group">
        <button onclick="navigate('#novel/${novelId}/chapters')">📖 章节列表</button>
        ${currentUser?.id === novel.author_id ? `
          <button class="outline" onclick="editNovelModal(${novel.id})">✏️ 编辑</button>
          <button class="danger" onclick="deleteNovel(${novel.id})">🗑️ 删除</button>
        ` : ''}
        ${currentProfile?.role === 'admin' && currentUser?.id !== novel.author_id ? `
          <button class="danger" onclick="deleteNovel(${novel.id})">🗑️ 管理员删除</button>
        ` : ''}
      </div>
    `;
    container.appendChild(card);
  }

  async function deleteNovel(novelId) {
    showConfirm('确定删除这部小说吗？所有章节、评论、评分将被永久删除。', async () => {
      const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
      if (error) return alert('删除失败：' + error.message);
      alert('小说已删除');
      navigate('#home');
    });
  }

  async function editNovelModal(novelId) {
    const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
    openFormModal('编辑小说', `
      <input id="edit-title" value="${escapeHtml(novel.title)}" placeholder="标题">
      <input id="edit-genre" value="${escapeHtml(novel.genre || '')}" placeholder="分类" style="margin-top:8px;">
      <textarea id="edit-desc" rows="4" placeholder="简介" style="margin-top:8px;">${escapeHtml(novel.description || '')}</textarea>
    `, async () => {
      const title = document.getElementById('edit-title').value.trim();
      if (!title) throw new Error('标题不能为空');
      const { error } = await supabaseClient.from('novels').update({
        title,
        genre: document.getElementById('edit-genre').value.trim(),
        description: document.getElementById('edit-desc').value.trim(),
        updated_at: new Date()
      }).eq('id', novelId);
      if (error) throw error;
      navigate(`#novel/${novelId}`);
    });
  }

  // ===================== 章节列表页 =====================
  async function renderChapterList(container, novelId) {
    const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
    if (!novel) return container.innerHTML += '<p>小说不存在</p>';
    const { data: chapters } = await supabaseClient.from('chapters').select('*').eq('novel_id', novelId).order('chapter_number');

    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<a class="back-link" onclick="navigate('#novel/${novelId}')">← 返回小说详情</a>
      <h2>${escapeHtml(novel.title)} · 章节列表</h2>`;
    if (chapters?.length) {
      chapters.forEach(ch => {
        card.innerHTML += `<div class="chapter-item">
          <a onclick="navigate('#chapter/${ch.id}')">第${ch.chapter_number}章 ${escapeHtml(ch.title)}</a>
          ${currentUser?.id === novel.author_id ? `
            <div>
              <button class="outline action-btn" onclick="editChapterModal(${ch.id}, ${novelId})">编辑</button>
              <button class="danger action-btn" onclick="deleteChapter(${ch.id}, ${novelId})">删除</button>
            </div>
          ` : ''}
        </div>`;
      });
    } else card.innerHTML += '<p>暂无章节</p>';
    if (currentUser?.id === novel.author_id) {
      card.innerHTML += `<button onclick="addChapterModal(${novelId})" style="margin-top:15px;">+ 添加新章节</button>`;
    }
    container.appendChild(card);
  }

  // 章节编辑/删除
  function addChapterModal(novelId) {
    openFormModal('添加章节', `
      <input id="ch-title" placeholder="章节标题">
      <input type="number" id="ch-number" placeholder="序号" style="margin-top:8px;">
      <textarea id="ch-content" placeholder="正文..." rows="6" style="margin-top:8px;"></textarea>
    `, async () => {
      const title = document.getElementById('ch-title').value.trim();
      const num = parseInt(document.getElementById('ch-number').value);
      const content = document.getElementById('ch-content').value.trim();
      if (!title || isNaN(num) || !content) throw new Error('请填写完整');
      const { error } = await supabaseClient.from('chapters').insert({ novel_id: novelId, title, content, chapter_number: num });
      if (error) throw error;
      await supabaseClient.from('novels').update({ updated_at: new Date() }).eq('id', novelId);
      navigate(`#novel/${novelId}/chapters`);
    });
  }

  function editChapterModal(chapterId, novelId) {
    supabaseClient.from('chapters').select('*').eq('id', chapterId).single().then(({data:ch}) => {
      openFormModal('编辑章节', `
        <input id="ch-title" value="${escapeHtml(ch.title)}" placeholder="章节标题">
        <input type="number" id="ch-number" value="${ch.chapter_number}" placeholder="序号" style="margin-top:8px;">
        <textarea id="ch-content" rows="6" placeholder="正文..." style="margin-top:8px;">${escapeHtml(ch.content)}</textarea>
      `, async () => {
        const title = document.getElementById('ch-title').value.trim();
        const num = parseInt(document.getElementById('ch-number').value);
        const content = document.getElementById('ch-content').value.trim();
        if (!title || isNaN(num) || !content) throw new Error('请填写完整');
        const { error } = await supabaseClient.from('chapters').update({ title, content, chapter_number: num }).eq('id', chapterId);
        if (error) throw error;
        await supabaseClient.from('novels').update({ updated_at: new Date() }).eq('id', novelId);
        navigate(`#novel/${novelId}/chapters`);
      });
    });
  }

  function deleteChapter(chapterId, novelId) {
    showConfirm('确定删除该章节吗？', async () => {
      const { error } = await supabaseClient.from('chapters').delete().eq('id', chapterId);
      if (error) return alert('删除失败：' + error.message);
      alert('章节已删除');
      navigate(`#novel/${novelId}/chapters`);
    });
  }

  // ===================== 章节内容页 =====================
  async function renderChapterContent(container, chapterId) {
    const { data: chapter, error } = await supabaseClient.from('chapters').select('*, novels!inner(id, title, author_id)').eq('id', chapterId).single();
    if (error || !chapter) return container.innerHTML += '<p>章节不存在</p>';

    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username)').eq('novel_id', chapter.novels.id).order('created_at', { ascending: true });

    const contentCard = document.createElement('div'); contentCard.className = 'card';
    contentCard.innerHTML = `
      <a class="back-link" onclick="navigate('#novel/${chapter.novels.id}/chapters')">← 返回章节列表</a>
      <h2>${escapeHtml(chapter.title)}</h2>
      <pre>${escapeHtml(chapter.content)}</pre>
      ${currentUser?.id === chapter.novels.author_id ? `
        <div class="btn-group">
          <button class="outline" onclick="editChapterModal(${chapter.id}, ${chapter.novels.id})">编辑章节</button>
          <button class="danger" onclick="deleteChapter(${chapter.id}, ${chapter.novels.id})">删除章节</button>
        </div>
      ` : ''}
    `;
    container.appendChild(contentCard);

    const commentCard = document.createElement('div'); commentCard.className = 'card';
    commentCard.innerHTML = '<h3>💬 评论区</h3>';
    if (comments?.length) {
      comments.forEach(c => {
        commentCard.innerHTML += `<div style="margin-bottom:12px;"><strong>${escapeHtml(c.profiles?.username)}</strong>：${escapeHtml(c.content)} <small style="color:#aaa;">${new Date(c.created_at).toLocaleString()}</small></div>`;
      });
    } else commentCard.innerHTML += '<p style="color:#888;">暂无评论</p>';
    if (currentUser) {
      commentCard.innerHTML += `
        <textarea id="new-comment" placeholder="写下你的评论..." rows="3" style="margin-top:10px;"></textarea>
        <button onclick="addComment('${chapter.novels.id}')" style="margin-top:8px;">发表评论</button>
      `;
    } else commentCard.innerHTML += '<p style="margin-top:10px;">请先登录发表评论</p>';
    container.appendChild(commentCard);
  }

  async function addComment(novelId) {
    const content = document.getElementById('new-comment').value.trim();
    if (!content) return alert('评论不能为空');
    const { error } = await supabaseClient.from('comments').insert({ novel_id: novelId, user_id: currentUser.id, content });
    if (error) alert(error.message);
    else {
      const hash = window.location.hash;
      const chapterId = hash.split('/')[1];
      navigate(`#chapter/${chapterId}`);
    }
  }

  // ===================== 发布小说 =====================
  async function renderNewNovel(container) {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>📝 发布新小说</h2>
      <input id="new-title" placeholder="小说标题">
      <input id="new-genre" placeholder="分类" style="margin-top:8px;">
      <textarea id="new-description" placeholder="简介..." rows="4" style="margin-top:8px;"></textarea>
      <button onclick="publishNovel()" style="width:100%; margin-top:12px;">立即发布</button>
      <div id="publish-error" style="color:red;"></div>`;
    container.appendChild(card);
  }

  async function publishNovel() {
    const title = document.getElementById('new-title').value.trim();
    const genre = document.getElementById('new-genre').value.trim();
    const description = document.getElementById('new-description').value.trim();
    const err = document.getElementById('publish-error');
    if (!title) return err.textContent = '请输入小说标题';
    const { data, error } = await supabaseClient.from('novels').insert({ title, genre, description, author_id: currentUser.id, status: '连载中' }).select();
    if (error) return err.textContent = '插入失败：' + error.message;
    if (data?.[0]) { alert('发布成功！'); navigate('#home'); }
    else err.textContent = '发布失败，请重试';
  }

  // ===================== 个人中心 =====================
  async function renderProfile(container) {
    if (!currentUser) return navigate('#home');
    const back = document.createElement('div'); back.className = 'back-link'; back.textContent = '← 返回首页'; back.onclick = () => navigate('#home');
    container.appendChild(back);

    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>${escapeHtml(currentProfile.username)} 的个人中心</h2>
      <p>角色：${currentProfile.role === 'admin' ? '管理员' : '用户'}</p>
      <button onclick="changeUsername()">修改用户名</button>
      <h3 style="margin-top:15px;">📖 我发布的小说</h3>
      <div id="my-novels-list"></div>
      <h3 style="margin-top:15px;">💬 我的评论</h3>
      <div id="my-comments-list"></div>
      <h3 style="margin-top:15px;">⭐ 我的评分</h3>
      <div id="my-ratings-list"></div>
    `;
    container.appendChild(card);

    const { data: myNovels } = await supabaseClient.from('novels').select('*').eq('author_id', currentUser.id).order('updated_at', { ascending: false });
    document.getElementById('my-novels-list').innerHTML = myNovels?.length ? myNovels.map(n => `
      <div style="display:flex; justify-content:space-between; padding:6px 0;">
        <a onclick="navigate('#novel/${n.id}')">${escapeHtml(n.title)}</a>
        <div>
          <button class="outline" style="padding:2px 8px; font-size:12px;" onclick="editNovelModal(${n.id})">编辑</button>
          <button class="danger" style="padding:2px 8px; font-size:12px;" onclick="deleteNovelFromProfile(${n.id})">删除</button>
        </div>
      </div>`).join('') : '<p>暂无</p>';

    const { data: myComments } = await supabaseClient.from('comments').select('*, novels(title)').eq('user_id', currentUser.id);
    document.getElementById('my-comments-list').innerHTML = myComments?.length ? myComments.map(c => `<p>《${escapeHtml(c.novels.title)}》：${escapeHtml(c.content)}</p>`).join('') : '<p>暂无</p>';

    const { data: myRatings } = await supabaseClient.from('ratings').select('*, novels(title)').eq('user_id', currentUser.id);
    document.getElementById('my-ratings-list').innerHTML = myRatings?.length ? myRatings.map(r => `<p>《${escapeHtml(r.novels.title)}》：${r.score}星</p>`).join('') : '<p>暂无</p>';
  }

  async function deleteNovelFromProfile(novelId) {
    showConfirm('确定删除这部小说吗？', async () => {
      const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
      if (error) return alert('删除失败');
      alert('已删除');
      navigate('#profile');
    });
  }

  async function changeUsername() {
    const newName = prompt('新用户名');
    if (!newName) return;
    const { data: exist } = await supabaseClient.from('profiles').select('id').eq('username', newName).maybeSingle();
    if (exist && exist.id !== currentUser.id) return alert('用户名已存在');
    const { error } = await supabaseClient.from('profiles').update({ username: newName }).eq('id', currentUser.id);
    if (error) alert(error.message);
    else { alert('已更新'); render(); }
  }

  // ===================== 管理员后台 =====================
  async function renderAdmin(container) {
    const back = document.createElement('div'); back.className = 'back-link'; back.textContent = '← 返回首页'; back.onclick = () => navigate('#home');
    container.appendChild(back);
    const tabCard = document.createElement('div'); tabCard.className = 'card';
    tabCard.innerHTML = `
      <button onclick="renderAdminComments()">管理评论</button>
      <button onclick="renderAdminNovels()">管理小说</button>
      <button onclick="renderAdminAdmins()">管理管理员</button>
      <button onclick="editAnnouncement()">编辑公告</button>
    `;
    container.appendChild(tabCard);
    const contentDiv = document.createElement('div'); contentDiv.id = 'admin-content';
    container.appendChild(contentDiv);
    renderAdminComments();
  }

  async function renderAdminComments() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username), novels(title)').order('created_at', { ascending: false });
    if (comments?.length) {
      comments.forEach(c => {
        const div = document.createElement('div'); div.style.borderBottom='1px solid #eee'; div.style.padding='8px 0';
        div.innerHTML = `${escapeHtml(c.profiles?.username)} 评《${escapeHtml(c.novels.title)}》：${escapeHtml(c.content)} <button class="danger" onclick="deleteComment(${c.id})">删除</button>`;
        target.appendChild(div);
      });
    } else target.innerHTML = '<p>暂无评论</p>';
  }

  async function renderAdminNovels() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    if (novels?.length) {
      novels.forEach(n => {
        const div = document.createElement('div'); div.style.borderBottom='1px solid #eee'; div.style.padding='8px 0';
        div.innerHTML = `<strong>${escapeHtml(n.title)}</strong> 作者：${escapeHtml(n.profiles?.username)} <button class="danger" style="float:right;" onclick="deleteNovelAdmin(${n.id})">删除</button><div style="clear:both;"></div>`;
        target.appendChild(div);
      });
    } else target.innerHTML = '<p>暂无小说</p>';
  }

  async function deleteNovelAdmin(novelId) {
    showConfirm('管理员强制删除？', async () => {
      const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
      if (error) return alert('删除失败');
      alert('已删除');
      renderAdminNovels();
    });
  }

  async function deleteComment(id) {
    showConfirm('确认删除该评论？', async () => {
      await supabaseClient.from('comments').delete().eq('id', id);
      renderAdminComments();
    });
  }

  async function renderAdminAdmins() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: profiles } = await supabaseClient.from('profiles').select('*');
    if (profiles) {
      profiles.forEach(p => {
        const div = document.createElement('div'); div.style.borderBottom='1px solid #eee'; div.style.padding='8px 0';
        div.innerHTML = `${escapeHtml(p.username)} (${p.role}) `;
        if (p.email !== '18631167199@163.com' && p.id !== currentUser.id) {
          div.innerHTML += `<button onclick="toggleAdmin('${p.id}')">${p.role==='admin'?'撤销管理员':'设为管理员'}</button>`;
        } else if (p.email === '18631167199@163.com') div.innerHTML += '<small>（超级管理员）</small>';
        target.appendChild(div);
      });
    }
  }

  async function toggleAdmin(userId) {
    const { data: p } = await supabaseClient.from('profiles').select('role,email').eq('id', userId).single();
    if (p.email === '18631167199@163.com') return alert('超级管理员不可更改');
    const newRole = p.role === 'admin' ? 'user' : 'admin';
    await supabaseClient.from('profiles').update({ role: newRole }).eq('id', userId);
    renderAdminAdmins();
  }

  async function editAnnouncement() {
    const content = prompt('请输入公告内容');
    if (content) { await supabaseClient.from('announcements').insert({ content }); alert('公告已更新'); }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  render();
</script>
</body>
</html>
