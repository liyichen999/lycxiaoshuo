<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>lyc书库 · 小说社区</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f2eb; color:#3b3226; padding-bottom:70px; }
    .container { max-width:900px; margin:0 auto; padding:20px; }
    .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:#fff; border-top:1px solid #e0d7c6; display:flex; justify-content:space-around; align-items:center; padding:10px 0; z-index:99; box-shadow:0 -2px 8px rgba(0,0,0,0.05); }
    .bottom-nav button { background:none; border:none; color:#8b7355; font-size:13px; display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px; }
    .bottom-nav button.active { color:#3b3226; font-weight:bold; }
    .bottom-nav button .nav-icon { font-size:18px; }
    .navbar { display:flex; justify-content:space-between; align-items:center; background:#fff; padding:12px 20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .logo { font-size:1.5rem; font-weight:bold; color:#6b5b4a; cursor:pointer; }
    .user-badge { display:flex; align-items:center; gap:8px; }
    .avatar-circle { width:34px; height:34px; border-radius:50%; background:#8b7355; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; }
    .card { background:#fff; border-radius:12px; padding:20px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .flex-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f0ece4; }
    .flex-row:last-child { border-bottom:none; }
    button { background:#8b7355; color:#fff; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:14px; }
    button.outline { background:transparent; border:1px solid #8b7355; color:#8b7355; }
    button.danger { background:#b55; }
    input,textarea,select { width:100%; padding:10px; border:1px solid #ddd6c8; border-radius:6px; font-size:14px; margin-top:8px; }
    .stars { color:#e6b422; font-size:18px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-content { background:#fff; border-radius:16px; padding:30px; min-width:340px; max-width:90%; position:relative; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .close { position:absolute; top:15px; right:20px; font-size:20px; cursor:pointer; color:#8b7355; }
    .hidden { display:none !important; }
    a { color:#8b7355; cursor:pointer; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .meta { font-size:13px; color:#888; }
    .btn-group { display:flex; gap:8px; margin-top:15px; flex-wrap:wrap; }
    .chapter-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0ece4; }
    .chapter-item:last-child { border-bottom:none; }
    .action-btn { padding:4px 12px; font-size:12px; }
    .follow-btn { background:#4a6fa5; font-size:12px; padding:4px 12px; }
    .follow-btn.following { background:#aaa; }
    pre { white-space:pre-wrap; font-family:inherit; }
    .announcement-body h1, .announcement-body h2, .announcement-body h3 { font-size:1.1rem; margin:10px 0 5px; }
    .announcement-body p { margin:5px 0; }
    .announcement-body ul, .announcement-body ol { margin:5px 0 5px 20px; }
    .nav-chapter { display:flex; justify-content:space-between; margin-top:15px; }
    @media (max-width: 600px) {
      .navbar { padding:10px 15px; }
      .logo { font-size:1.2rem; }
      .card { padding:15px; }
      .bottom-nav button { font-size:11px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" id="app"></div>

<nav class="bottom-nav" id="bottom-nav">
  <button onclick="navigate('#home')" class="active"><span class="nav-icon">🏠</span>首页</button>
  <button onclick="openSearch()"><span class="nav-icon">🔍</span>搜索</button>
  <button onclick="navigate('#new-novel')"><span class="nav-icon">✏️</span>发布</button>
  <button onclick="navigate('#profile')"><span class="nav-icon">👤</span>我的</button>
  <button id="admin-nav" class="hidden" onclick="navigate('#admin')"><span class="nav-icon">⚙️</span>后台</button>
</nav>

<div id="login-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeLoginModal()">&times;</span>
    <h3>登录</h3>
    <input type="text" id="login-username" placeholder="用户名">
    <input type="password" id="login-password" placeholder="密码">
    <button onclick="login()" style="width:100%; margin-top:12px;">登录</button>
    <div id="login-error" style="color:red;"></div>
  </div>
</div>

<div id="register-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeRegisterModal()">&times;</span>
    <h3>注册</h3>
    <input type="text" id="reg-username" placeholder="用户名">
    <input type="email" id="reg-email" placeholder="邮箱">
    <input type="password" id="reg-password" placeholder="密码(至少6位)">
    <button onclick="register()" style="width:100%; margin-top:12px;">注册</button>
    <div id="reg-error" style="color:red;"></div>
  </div>
</div>

<div id="form-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeFormModal()">&times;</span>
    <h3 id="form-title">标题</h3>
    <div id="form-body"></div>
    <button id="form-submit" onclick="submitForm()" style="width:100%; margin-top:12px;">提交</button>
    <div id="form-error" style="color:red; margin-top:5px;"></div>
  </div>
</div>

<div id="confirm-modal" class="modal hidden">
  <div class="modal-content" style="text-align:center;">
    <p id="confirm-message"></p>
    <div class="btn-group" style="justify-content:center; margin-top:20px;">
      <button class="outline" onclick="closeConfirmModal()">取消</button>
      <button class="danger" id="confirm-ok">确认</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://srbibtnvtpygegmtehzb.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8ET2ng5O0n6phqCtoz3bxA_xTn2cTsi';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentProfile = null;
  let isRendering = false;
  let formCallback = null;

  // 路由
  function navigate(hash) { window.location.hash = hash; render(); }
  window.onhashchange = () => render();

  function updateBottomNav() {
    const hash = window.location.hash || '#home';
    const buttons = document.querySelectorAll('#bottom-nav button');
    buttons.forEach(b => b.classList.remove('active'));
    if (hash === '#home') buttons[0].classList.add('active');
    else if (hash === '#new-novel') buttons[2].classList.add('active');
    else if (hash === '#profile') buttons[3].classList.add('active');
    else if (hash === '#admin') buttons[4].classList.add('active');
  }

  function openSearch() {
    navigate('#home');
    setTimeout(() => {
      const inp = document.getElementById('search-input');
      if (inp) inp.focus();
    }, 200);
  }

  async function render() {
    if (isRendering) return;
    isRendering = true;
    const app = document.getElementById('app');
    app.innerHTML = '';

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { currentUser = session.user; await fetchProfile(); }
    else { currentUser = null; currentProfile = null; }

    const nav = document.createElement('div'); nav.className = 'navbar';
    nav.innerHTML = `<div class="logo" onclick="navigate('#home')">📖 lyc书库</div>`;
    if (currentUser && currentProfile) {
      nav.innerHTML += `<div class="user-badge">
        <span onclick="navigate('#user/${currentProfile.username}')" style="cursor:pointer;">${escapeHtml(currentProfile.username)}</span>
        <div class="avatar-circle" title="${escapeHtml(currentProfile.username)}" onclick="navigate('#profile')">${escapeHtml(currentProfile.username[0])}</div>
        <button onclick="signOut()" style="font-size:12px; padding:4px 10px;">退出</button>
      </div>`;
    } else {
      nav.innerHTML += `<div><button onclick="openLoginModal()">登录</button><button onclick="openRegisterModal()" style="margin-left:5px;">注册</button></div>`;
    }
    app.appendChild(nav);

    const adminBtn = document.getElementById('admin-nav');
    if (currentProfile?.role === 'admin') adminBtn.classList.remove('hidden');
    else adminBtn.classList.add('hidden');
    updateBottomNav();

    const hash = window.location.hash || '#home';
    if (hash === '#home') await renderHome(app);
    else if (hash.startsWith('#novel/')) {
      const parts = hash.split('/');
      const novelId = parts[1];
      if (parts.length === 3 && parts[2] === 'chapters') await renderChapterList(app, novelId);
      else await renderNovelDetail(app, novelId);
    }
    else if (hash.startsWith('#chapter/')) await renderChapterContent(app, hash.split('/')[1]);
    else if (hash.startsWith('#user/')) await renderUserProfile(app, hash.split('/')[1]);
    else if (hash === '#new-novel') await renderNewNovel(app);
    else if (hash === '#profile') await renderProfile(app);
    else if (hash === '#admin' && currentProfile?.role === 'admin') await renderAdmin(app);
    else renderHome(app);

    isRendering = false;
  }

  async function fetchProfile() {
    if (!currentUser) return;
    const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = data || null;
  }

  // 模态框管理
  function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
  function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
  function openRegisterModal() { document.getElementById('register-modal').classList.remove('hidden'); }
  function closeRegisterModal() { document.getElementById('register-modal').classList.add('hidden'); }
  function openFormModal(title, html, cb) {
    document.getElementById('form-title').textContent = title;
    document.getElementById('form-body').innerHTML = html;
    document.getElementById('form-modal').classList.remove('hidden');
    document.getElementById('form-error').textContent = '';
    formCallback = cb;
  }
  function closeFormModal() { document.getElementById('form-modal').classList.add('hidden'); formCallback = null; }
  async function submitForm() {
    if (formCallback) {
      const err = document.getElementById('form-error');
      err.textContent = '';
      try { await formCallback(); closeFormModal(); } catch (e) { err.textContent = e.message; }
    }
  }
  function showConfirm(message, onConfirm) {
    document.getElementById('confirm-message').textContent = message;
    document.getElementById('confirm-modal').classList.remove('hidden');
    document.getElementById('confirm-ok').onclick = () => {
      document.getElementById('confirm-modal').classList.add('hidden');
      if (onConfirm) onConfirm();
    };
  }
  function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

  // 登录/注册
  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error'); err.textContent = '';
    if (!username || !password) return err.textContent = '请输入用户名和密码';
    const { data: profile } = await supabaseClient.from('profiles').select('email').eq('username', username).single();
    if (!profile) return err.textContent = '用户名不存在';
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email: profile.email, password });
    if (error) return err.textContent = '密码错误';
    closeLoginModal();
    currentUser = data.user;
    await fetchProfile();
    render();
  }

  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-error'); err.textContent = '';
    if (!username || !email || !password) return err.textContent = '请填写所有字段';
    if (password.length < 6) return err.textContent = '密码至少6位';
    const { data: exist } = await supabaseClient.from('profiles').select('id').or(`username.eq."${username}",email.eq."${email}"`).maybeSingle();
    if (exist) return err.textContent = '用户名或邮箱已被注册';
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
    if (signUpError) return err.textContent = signUpError.message;
    let userId = signUpData.user?.id;
    if (!userId) return err.textContent = '用户创建失败';
    if (!signUpData.session) {
      const { data: loginData } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (loginData.error) return err.textContent = '自动登录失败，请手动登录';
      userId = loginData.user.id;
    } else await supabaseClient.auth.setSession(signUpData.session);
    const role = (email === '18631167199@163.com') ? 'admin' : 'user';
    const { error: upsertError } = await supabaseClient.from('profiles').upsert({ id: userId, username, email, role });
    if (upsertError) return err.textContent = '资料写入失败';
    await supabaseClient.auth.signOut();
    alert('注册成功，请登录');
    closeRegisterModal();
  }

  async function signOut() {
    await supabaseClient.auth.signOut();
    currentUser = null; currentProfile = null;
    render();
  }

  // 首页（Markdown公告、搜索、推荐）
  async function renderHome(container) {
    const { data: announcements } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
    if (announcements?.length) {
      const annCard = document.createElement('div'); annCard.className = 'card';
      const contentHtml = marked.parse(announcements[0].content);
      annCard.innerHTML = `<strong>📢 公告</strong><br><small>${new Date(announcements[0].created_at).toLocaleString()}</small>
        <div class="announcement-body" style="margin-top:8px;">${contentHtml}</div>`;
      container.appendChild(annCard);
    }

    const searchDiv = document.createElement('div'); searchDiv.className = 'card';
    searchDiv.innerHTML = `
      <div style="display:flex; gap:8px;">
        <input type="text" id="search-input" placeholder="搜索小说、作者或用户...">
        <button onclick="performSearch()">搜索</button>
      </div>
      <div id="search-results" style="margin-top:10px;"></div>`;
    container.appendChild(searchDiv);

    // 推荐
    let novels;
    if (currentUser) {
      const { data: follows } = await supabaseClient.from('follows').select('following_id').eq('follower_id', currentUser.id);
      const followedIds = follows?.map(f => f.following_id) || [];
      const { data: ratings } = await supabaseClient.from('ratings').select('novels(genre)').eq('user_id', currentUser.id).gte('score', 3);
      const preferredGenres = ratings?.map(r => r.novels?.genre).filter(Boolean) || [];
      const { data: allNovels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
      novels = allNovels || [];
      novels.sort((a, b) => {
        const aFollowed = followedIds.includes(a.author_id) ? 1 : 0;
        const bFollowed = followedIds.includes(b.author_id) ? 1 : 0;
        if (aFollowed !== bFollowed) return bFollowed - aFollowed;
        const aType = preferredGenres.includes(a.genre) ? 1 : 0;
        const bType = preferredGenres.includes(b.genre) ? 1 : 0;
        if (aType !== bType) return bType - aType;
        return new Date(b.updated_at) - new Date(a.updated_at);
      });
    } else {
      const { data: allNovels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
      novels = allNovels || [];
    }
    displaySearchResults(novels, []);
  }

  // 搜索（小说 + 用户）
  async function performSearch() {
    const keyword = document.getElementById('search-input').value.trim().toLowerCase();
    if (!keyword) {
      // 空搜索，显示默认推荐
      const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
      displaySearchResults(novels || [], []);
      return;
    }
    // 搜索小说
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    const filteredNovels = novels.filter(n => n.title.toLowerCase().includes(keyword) || (n.profiles?.username?.toLowerCase().includes(keyword)));
    // 搜索用户
    const { data: profiles } = await supabaseClient.from('profiles').select('*').ilike('username', `%${keyword}%`);
    const matchedUsers = profiles || [];
    displaySearchResults(filteredNovels, matchedUsers);
  }

  function displaySearchResults(novels, users) {
    const resultsDiv = document.getElementById('search-results');
    if (!resultsDiv) return;
    resultsDiv.innerHTML = '';
    
    // 显示匹配的用户
    if (users && users.length) {
      resultsDiv.innerHTML += '<h4 style="margin-bottom:8px;">👥 用户</h4>';
      users.forEach(u => {
        resultsDiv.innerHTML += `<div style="padding:8px 0;"><a onclick="navigate('#user/${escapeHtml(u.username)}')">${escapeHtml(u.username)}</a></div>`;
      });
      resultsDiv.innerHTML += '<hr style="margin:10px 0;">';
    }

    // 显示小说
    if (novels && novels.length) {
      resultsDiv.innerHTML += '<h4 style="margin-bottom:8px;">📚 小说</h4>';
      novels.forEach(n => {
        const item = document.createElement('div'); item.className = 'flex-row';
        item.innerHTML = `
          <div style="flex:1;">
            <a onclick="navigate('#novel/${n.id}')" style="font-weight:500;">${escapeHtml(n.title)}</a>
            <div class="meta">${escapeHtml(n.profiles?.username || '未知')} · ${n.genre || '未分类'} · ${n.status}</div>
          </div>
          <span style="font-size:12px; color:#aaa;">${new Date(n.updated_at).toLocaleDateString()}</span>`;
        resultsDiv.appendChild(item);
      });
    } else if (!users || !users.length) {
      resultsDiv.innerHTML = '<p style="text-align:center; color:#888;">无匹配结果</p>';
    }
  }

  // 小说详情
  async function renderNovelDetail(container, novelId) {
    const { data: novel, error } = await supabaseClient.from('novels').select('*, profiles(username)').eq('id', novelId).single();
    if (error || !novel) { container.innerHTML += '<p>小说不存在</p>'; return; }
    const { data: ratings } = await supabaseClient.from('ratings').select('score').eq('novel_id', novelId);
    const avg = ratings?.length ? (ratings.reduce((a,b)=>a+b.score,0)/ratings.length).toFixed(1) : '暂无评分';
    let isFollowing = false;
    if (currentUser && currentUser.id !== novel.author_id) {
      const { data: f } = await supabaseClient.from('follows').select('*').eq('follower_id', currentUser.id).eq('following_id', novel.author_id).maybeSingle();
      isFollowing = !!f;
    }
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <a class="back-link" onclick="navigate('#home')">← 返回首页</a>
      <h2>${escapeHtml(novel.title)}</h2>
      <p class="meta">
        作者：<a onclick="navigate('#user/${escapeHtml(novel.profiles.username)}')">${escapeHtml(novel.profiles.username)}</a>
        ${currentUser && currentUser.id !== novel.author_id ? `<button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow('${novel.author_id}')" style="margin-left:8px;">${isFollowing?'已关注':'+ 关注'}</button>` : ''}
        | 状态：${novel.status} | 分类：${novel.genre || '未分类'}
      </p>
      <p>${escapeHtml(novel.description || '暂无简介')}</p>
      <div class="stars">⭐ ${avg} (${ratings?.length || 0}人评分)</div>
      <div class="btn-group">
        <button onclick="navigate('#novel/${novelId}/chapters')">📖 章节列表</button>
        ${currentUser?.id === novel.author_id ? `<button class="outline" onclick="editNovelModal(${novel.id})">✏️ 编辑</button><button class="danger" onclick="deleteNovel(${novel.id})">🗑️ 删除</button>` : ''}
        ${currentProfile?.role === 'admin' && currentUser?.id !== novel.author_id ? `<button class="danger" onclick="deleteNovel(${novel.id})">🗑️ 管理员删除</button>` : ''}
      </div>
    `;
    container.appendChild(card);
  }

  async function toggleFollow(authorId) {
    if (!currentUser) return alert('请先登录');
    const { data: follow } = await supabaseClient.from('follows').select('*').eq('follower_id', currentUser.id).eq('following_id', authorId).maybeSingle();
    if (follow) await supabaseClient.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', authorId);
    else await supabaseClient.from('follows').insert({ follower_id: currentUser.id, following_id: authorId });
    const novelId = window.location.hash.split('/')[1];
    navigate(`#novel/${novelId}`);
  }

  async function deleteNovel(novelId) {
    showConfirm('确定删除这部小说吗？所有章节、评论、评分将被永久删除。', async () => {
      const { error } = await supabaseClient.from('novels').delete().eq('id', novelId);
      if (error) return alert('删除失败');
      alert('小说已删除');
      navigate('#home');
    });
  }

  function editNovelModal(novelId) {
    supabaseClient.from('novels').select('*').eq('id', novelId).single().then(({data:novel}) => {
      openFormModal('编辑小说', `
        <input id="edit-title" value="${escapeHtml(novel.title)}" placeholder="标题">
        <input id="edit-genre" value="${escapeHtml(novel.genre || '')}" placeholder="分类" style="margin-top:8px;">
        <textarea id="edit-desc" rows="4" placeholder="简介" style="margin-top:8px;">${escapeHtml(novel.description || '')}</textarea>
      `, async () => {
        const title = document.getElementById('edit-title').value.trim();
        if (!title) throw new Error('标题不能为空');
        await supabaseClient.from('novels').update({
          title,
          genre: document.getElementById('edit-genre').value.trim(),
          description: document.getElementById('edit-desc').value.trim(),
          updated_at: new Date()
        }).eq('id', novelId);
        navigate(`#novel/${novelId}`);
      });
    });
  }

  // 章节列表
  async function renderChapterList(container, novelId) {
    const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
    if (!novel) return container.innerHTML += '<p>小说不存在</p>';
    const { data: chapters } = await supabaseClient.from('chapters').select('*').eq('novel_id', novelId).order('chapter_number');
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<a class="back-link" onclick="navigate('#novel/${novelId}')">← 返回小说详情</a><h2>${escapeHtml(novel.title)} · 章节列表</h2>`;
    if (chapters?.length) {
      chapters.forEach(ch => {
        card.innerHTML += `<div class="chapter-item">
          <a onclick="navigate('#chapter/${ch.id}')">第${ch.chapter_number}章 ${escapeHtml(ch.title)}</a>
          ${currentUser?.id === novel.author_id ? `<div>
            <button class="outline action-btn" onclick="editChapterModal(${ch.id}, ${novelId})">编辑</button>
            <button class="danger action-btn" onclick="deleteChapter(${ch.id}, ${novelId})">删除</button>
          </div>` : ''}
        </div>`;
      });
    } else card.innerHTML += '<p>暂无章节</p>';
    if (currentUser?.id === novel.author_id) {
      card.innerHTML += `<button onclick="addChapterModal(${novelId})" style="margin-top:15px;">+ 添加新章节</button>`;
    }
    container.appendChild(card);
  }

  function addChapterModal(novelId) {
    openFormModal('添加章节', `
      <input id="ch-title" placeholder="章节标题">
      <input type="number" id="ch-number" placeholder="序号" style="margin-top:8px;">
      <textarea id="ch-content" rows="6" placeholder="正文..." style="margin-top:8px;"></textarea>
    `, async () => {
      const title = document.getElementById('ch-title').value.trim();
      const num = parseInt(document.getElementById('ch-number').value);
      const content = document.getElementById('ch-content').value.trim();
      if (!title || isNaN(num) || !content) throw new Error('请填写完整');
      await supabaseClient.from('chapters').insert({ novel_id: novelId, title, content, chapter_number: num });
      await supabaseClient.from('novels').update({ updated_at: new Date() }).eq('id', novelId);
      navigate(`#novel/${novelId}/chapters`);
    });
  }

  function editChapterModal(chapterId, novelId) {
    supabaseClient.from('chapters').select('*').eq('id', chapterId).single().then(({data:ch}) => {
      openFormModal('编辑章节', `
        <input id="ch-title" value="${escapeHtml(ch.title)}" placeholder="标题">
        <input type="number" id="ch-number" value="${ch.chapter_number}" placeholder="序号" style="margin-top:8px;">
        <textarea id="ch-content" rows="6" style="margin-top:8px;">${escapeHtml(ch.content)}</textarea>
      `, async () => {
        const title = document.getElementById('ch-title').value.trim();
        const num = parseInt(document.getElementById('ch-number').value);
        const content = document.getElementById('ch-content').value.trim();
        if (!title || isNaN(num) || !content) throw new Error('请填写完整');
        await supabaseClient.from('chapters').update({ title, content, chapter_number: num }).eq('id', chapterId);
        await supabaseClient.from('novels').update({ updated_at: new Date() }).eq('id', novelId);
        navigate(`#novel/${novelId}/chapters`);
      });
    });
  }

  function deleteChapter(chapterId, novelId) {
    showConfirm('确定删除该章节吗？', async () => {
      await supabaseClient.from('chapters').delete().eq('id', chapterId);
      alert('章节已删除');
      navigate(`#novel/${novelId}/chapters`);
    });
  }

  // 章节内容（含上一章/下一章、评论区）
  async function renderChapterContent(container, chapterId) {
    const { data: chapter, error } = await supabaseClient.from('chapters').select('*, novels!inner(id, title, author_id)').eq('id', chapterId).single();
    if (error || !chapter) return container.innerHTML += '<p>章节不存在</p>';
    
    // 获取所有章节以便导航
    const { data: allChapters } = await supabaseClient.from('chapters').select('id,chapter_number').eq('novel_id', chapter.novels.id).order('chapter_number');
    const currentIdx = allChapters.findIndex(ch => ch.id === chapterId);
    const prevChapter = currentIdx > 0 ? allChapters[currentIdx - 1] : null;
    const nextChapter = currentIdx < allChapters.length - 1 ? allChapters[currentIdx + 1] : null;

    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username)').eq('novel_id', chapter.novels.id).order('created_at', { ascending: true });

    const contentCard = document.createElement('div'); contentCard.className = 'card';
    contentCard.innerHTML = `
      <a class="back-link" onclick="navigate('#novel/${chapter.novels.id}/chapters')">← 返回章节列表</a>
      <h2>${escapeHtml(chapter.title)}</h2>
      <pre>${escapeHtml(chapter.content)}</pre>
      <div class="nav-chapter">
        <button onclick="navigate('#chapter/${prevChapter.id}')" ${prevChapter ? '' : 'disabled'}>← 上一章</button>
        <button onclick="navigate('#chapter/${nextChapter.id}')" ${nextChapter ? '' : 'disabled'}>下一章 →</button>
      </div>
      ${currentUser?.id === chapter.novels.author_id ? `<div class="btn-group" style="margin-top:12px;">
        <button class="outline" onclick="editChapterModal(${chapter.id}, ${chapter.novels.id})">编辑章节</button>
        <button class="danger" onclick="deleteChapter(${chapter.id}, ${chapter.novels.id})">删除章节</button>
      </div>` : ''}
    `;
    container.appendChild(contentCard);

    const commentCard = document.createElement('div'); commentCard.className = 'card';
    commentCard.innerHTML = '<h3>💬 评论区</h3>';
    if (comments?.length) {
      comments.forEach(c => commentCard.innerHTML += `<div style="margin-bottom:12px;"><strong>${escapeHtml(c.profiles?.username)}</strong>：${escapeHtml(c.content)} <small style="color:#aaa;">${new Date(c.created_at).toLocaleString()}</small></div>`);
    } else commentCard.innerHTML += '<p>暂无评论</p>';
    if (currentUser) {
      commentCard.innerHTML += `<textarea id="new-comment" placeholder="写下你的评论..." rows="3" style="margin-top:10px;"></textarea>
        <button onclick="addComment('${chapter.novels.id}')" style="margin-top:8px;">发表评论</button>`;
    } else commentCard.innerHTML += '<p style="margin-top:10px;">请先登录发表评论</p>';
    container.appendChild(commentCard);
  }

  async function addComment(novelId) {
    const content = document.getElementById('new-comment').value.trim();
    if (!content) return alert('评论不能为空');
    const { error } = await supabaseClient.from('comments').insert({ novel_id: novelId, user_id: currentUser.id, content });
    if (error) alert(error.message);
    else {
      const chapterId = window.location.hash.split('/')[1];
      navigate(`#chapter/${chapterId}`);
    }
  }

  // 用户公开主页
  async function renderUserProfile(container, username) {
    const { data: profile } = await supabaseClient.from('profiles').select('*').eq('username', username).single();
    if (!profile) return container.innerHTML += '<p>用户不存在</p>';
    const { data: novels } = await supabaseClient.from('novels').select('*').eq('author_id', profile.id).order('updated_at', { ascending: false });
    const { data: followers } = await supabaseClient.from('follows').select('follower_id', { count: 'exact' }).eq('following_id', profile.id);
    const { data: following } = await supabaseClient.from('follows').select('following_id', { count: 'exact' }).eq('follower_id', profile.id);
    const isOwner = currentUser?.id === profile.id;
    const isFollowing = currentUser ? !!followers?.find(f => f.follower_id === currentUser.id) : false;
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <a class="back-link" onclick="history.back()">← 返回</a>
      <h2>${escapeHtml(profile.username)} 的主页</h2>
      <p>${escapeHtml(profile.role || '用户')} · 关注者 ${followers?.length || 0} · 关注中 ${following?.length || 0}</p>
      ${!isOwner && currentUser ? `<button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollowUser('${profile.id}')">${isFollowing?'已关注':'+ 关注'}</button>` : ''}
      <h3 style="margin-top:15px;">📖 发布的小说</h3>
      ${novels?.length ? novels.map(n => `<p><a onclick="navigate('#novel/${n.id}')">${escapeHtml(n.title)}</a></p>`).join('') : '<p>暂无作品</p>'}
    `;
    container.appendChild(card);
  }

  async function toggleFollowUser(userId) {
    if (!currentUser) return alert('请先登录');
    const { data: follow } = await supabaseClient.from('follows').select('*').eq('follower_id', currentUser.id).eq('following_id', userId).maybeSingle();
    if (follow) await supabaseClient.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', userId);
    else await supabaseClient.from('follows').insert({ follower_id: currentUser.id, following_id: userId });
    // 刷新当前用户主页
    const username = window.location.hash.split('/')[1];
    navigate(`#user/${username}`);
  }

  // 发布小说
  async function renderNewNovel(container) {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>📝 发布新小说</h2>
      <input id="new-title" placeholder="小说标题">
      <input id="new-genre" placeholder="分类" style="margin-top:8px;">
      <textarea id="new-description" rows="4" placeholder="简介..." style="margin-top:8px;"></textarea>
      <button onclick="publishNovel()" style="width:100%; margin-top:12px;">立即发布</button>
      <div id="publish-error" style="color:red;"></div>`;
    container.appendChild(card);
  }

  async function publishNovel() {
    const title = document.getElementById('new-title').value.trim();
    const genre = document.getElementById('new-genre').value.trim();
    const desc = document.getElementById('new-description').value.trim();
    if (!title) return document.getElementById('publish-error').textContent = '请输入标题';
    const { data, error } = await supabaseClient.from('novels').insert({ title, genre, description: desc, author_id: currentUser.id, status: '连载中' }).select();
    if (error) return document.getElementById('publish-error').textContent = error.message;
    if (data?.[0]) { alert('发布成功！'); navigate('#home'); }
    else document.getElementById('publish-error').textContent = '发布失败';
  }

  // 个人中心
  async function renderProfile(container) {
    if (!currentUser) return navigate('#home');
    const { data: myNovels } = await supabaseClient.from('novels').select('*').eq('author_id', currentUser.id).order('updated_at', { ascending: false });
    const { data: followers } = await supabaseClient.from('follows').select('*', { count: 'exact' }).eq('following_id', currentUser.id);
    const { data: following } = await supabaseClient.from('follows').select('*', { count: 'exact' }).eq('follower_id', currentUser.id);
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>我的个人中心</h2>
      <p>${escapeHtml(currentProfile.username)} · 关注者 ${followers?.length || 0} · 关注中 ${following?.length || 0}</p>
      <button onclick="changeUsername()">修改用户名</button>
      <h3 style="margin-top:15px;">📖 我的小说</h3>
      ${myNovels?.length ? myNovels.map(n => `<p><a onclick="navigate('#novel/${n.id}')">${escapeHtml(n.title)}</a></p>`).join('') : '<p>暂无</p>'}
      <h3 style="margin-top:15px;">💬 我的评论</h3><div id="my-comments"></div>
      <h3 style="margin-top:15px;">⭐ 我的评分</h3><div id="my-ratings"></div>
    `;
    container.appendChild(card);
    const { data: comments } = await supabaseClient.from('comments').select('*, novels(title)').eq('user_id', currentUser.id);
    document.getElementById('my-comments').innerHTML = comments?.length ? comments.map(c => `<p>《${escapeHtml(c.novels.title)}》：${escapeHtml(c.content)}</p>`).join('') : '<p>暂无</p>';
    const { data: ratings } = await supabaseClient.from('ratings').select('*, novels(title)').eq('user_id', currentUser.id);
    document.getElementById('my-ratings').innerHTML = ratings?.length ? ratings.map(r => `<p>《${escapeHtml(r.novels.title)}》：${r.score}星</p>`).join('') : '<p>暂无</p>';
  }

  async function changeUsername() {
    const newName = prompt('新用户名');
    if (!newName) return;
    const { data: exist } = await supabaseClient.from('profiles').select('id').eq('username', newName).maybeSingle();
    if (exist && exist.id !== currentUser.id) return alert('用户名已存在');
    await supabaseClient.from('profiles').update({ username: newName }).eq('id', currentUser.id);
    alert('用户名已更新');
    currentProfile.username = newName;
    render();
  }

  // 管理员后台
  async function renderAdmin(container) {
    if (!currentProfile || currentProfile.role !== 'admin') return navigate('#home');
    const tabCard = document.createElement('div'); tabCard.className = 'card';
    tabCard.innerHTML = `
      <button onclick="renderAdminComments()">管理评论</button>
      <button onclick="renderAdminNovels()">管理小说</button>
      <button onclick="renderAdminAdmins()">管理管理员</button>
      <button onclick="editAnnouncementModal()">编辑公告</button>`;
    container.appendChild(tabCard);
    const contentDiv = document.createElement('div'); contentDiv.id = 'admin-content';
    container.appendChild(contentDiv);
    renderAdminComments();
  }

  async function renderAdminComments() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: comments } = await supabaseClient.from('comments').select('*, profiles(username), novels(title)').order('created_at', { ascending: false });
    if (comments?.length) comments.forEach(c => target.innerHTML += `<div style="border-bottom:1px solid #eee; padding:8px 0;">${escapeHtml(c.profiles?.username)} 评《${escapeHtml(c.novels.title)}》：${escapeHtml(c.content)} <button class="danger" onclick="deleteComment(${c.id})">删除</button></div>`);
    else target.innerHTML = '<p>暂无评论</p>';
  }

  async function renderAdminNovels() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: novels } = await supabaseClient.from('novels').select('*, profiles(username)').order('updated_at', { ascending: false });
    if (novels?.length) novels.forEach(n => target.innerHTML += `<div style="border-bottom:1px solid #eee; padding:8px 0;"><strong>${escapeHtml(n.title)}</strong> 作者：${escapeHtml(n.profiles?.username)} <button class="danger" style="float:right;" onclick="deleteNovelAdmin(${n.id})">删除</button></div>`);
    else target.innerHTML = '<p>暂无小说</p>';
  }

  async function deleteNovelAdmin(novelId) {
    showConfirm('管理员强制删除？', async () => {
      await supabaseClient.from('novels').delete().eq('id', novelId);
      alert('已删除');
      renderAdminNovels();
    });
  }

  async function deleteComment(id) {
    showConfirm('删除评论？', async () => {
      await supabaseClient.from('comments').delete().eq('id', id);
      renderAdminComments();
    });
  }

  async function renderAdminAdmins() {
    const target = document.getElementById('admin-content'); target.innerHTML = '';
    const { data: profiles } = await supabaseClient.from('profiles').select('*');
    if (profiles) profiles.forEach(p => {
      target.innerHTML += `<div style="border-bottom:1px solid #eee; padding:8px 0;">${escapeHtml(p.username)} (${p.role}) ${p.email !== '18631167199@163.com' && p.id !== currentUser.id ? `<button onclick="toggleAdmin('${p.id}')">${p.role==='admin'?'撤销':'设为'}管理员</button>` : '<small>（超级管理员）</small>'}</div>`;
    });
  }

  async function toggleAdmin(userId) {
    const { data: p } = await supabaseClient.from('profiles').select('role,email').eq('id', userId).single();
    if (p.email === '18631167199@163.com') return alert('超级管理员不可更改');
    const newRole = p.role === 'admin' ? 'user' : 'admin';
    await supabaseClient.from('profiles').update({ role: newRole }).eq('id', userId);
    renderAdminAdmins();
  }

  function editAnnouncementModal() {
    openFormModal('编辑公告（支持 Markdown）', `
      <textarea id="announce-content" rows="6" placeholder="输入公告内容，支持 Markdown 语法..."></textarea>
      <small style="color:#888;">支持 **加粗**、[链接](url)、- 列表、# 标题等</small>
    `, async () => {
      const content = document.getElementById('announce-content').value.trim();
      if (!content) throw new Error('公告不能为空');
      await supabaseClient.from('announcements').insert({ content });
      alert('公告已更新');
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
  }

  render();
</script>
</body>
</html>
